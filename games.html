<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>游戏存档 | 阮奇桢</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="阮奇桢的个人练习项目：游戏作品集">
  <meta name="keywords" content="阮奇桢, 游戏, 小蜜蜂, 坦克战, HTML5游戏">

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">

  <style>
    :root {
      --bg-body: #f4f6f5;
      --bg-card: rgba(255, 255, 255, 0.85);
      --text-primary: #1a2b25;
      --text-secondary: #496058;
      --text-accent: #d97706;
      /* 游戏主题采用更活泼的琥珀色 */
      --border-line: #e8ece9;
      --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 12px 40px rgba(217, 119, 6, 0.15);
      --gradient-accent: linear-gradient(135deg, #d97706, #f59e0b);
      --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --bg-gradient-start: #f2f5f8;
      --bg-gradient-end: #e7edf2;
    }

    html.dark {
      --bg-body: #0d1110;
      --bg-card: rgba(20, 26, 24, 0.9);
      --text-primary: #e0e8e4;
      --text-secondary: #8a9b95;
      --text-accent: #fbbf24;
      --border-line: #243530;
      --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-hover: 0 12px 40px rgba(251, 191, 36, 0.2);
      --bg-gradient-start: #0a0f0e;
      --bg-gradient-end: #121a17;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-primary);
      line-height: 1.6;
      background: var(--bg-body);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      transition: background 0.3s ease;
      position: relative;
      overflow-x: hidden;
    }

    /* 模拟 CRT 扫描线效果 (仅在暗色模式更明显) */
    body::after {
      content: " ";
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      background-size: 100% 3px, 3px 100%;
      z-index: 1000;
      pointer-events: none;
      opacity: 0.3;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      opacity: 0.8;
    }

    .container {
      width: 100%;
      max-width: 680px;
      margin: 80px 20px;
      padding: 60px 50px;
      background: var(--bg-card);
      box-shadow: var(--shadow-card);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      animation: fadeIn 0.6s ease-out;
      border: 1px solid var(--border-line);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 40px;
      transition: all 0.2s;
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.03);
    }

    .back-link:hover {
      color: var(--text-accent);
      background: rgba(217, 119, 6, 0.1);
      transform: translateX(-4px);
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .header h1 {
      font-size: 32px;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      font-size: 15px;
      color: var(--text-secondary);
      max-width: 80%;
      margin: 0 auto;
    }

    .games-list {
      display: grid;
      gap: 24px;
      margin-bottom: 48px;
    }

    .game-card {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      padding: 28px;
      border: 1px solid var(--border-line);
      transition: all 0.3s var(--transition-smooth);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .game-card:hover {
      transform: scale(1.02);
      box-shadow: var(--shadow-hover);
      border-color: var(--text-accent);
    }

    .game-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* 游戏图标样式 */
    .game-icon-box {
      width: 50px;
      height: 50px;
      background: rgba(217, 119, 6, 0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-accent);
    }

    .game-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .game-links {
      display: flex;
      gap: 12px;
    }

    .game-link {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: var(--bg-body);
      border: 1px solid var(--border-line);
      color: var(--text-secondary);
      transition: all 0.2s;
      position: relative;
    }

    .game-link:hover {
      background: var(--text-accent);
      color: white;
      transform: translateY(-2px);
    }

    /* 提示文字 */
    .game-link::after {
      content: attr(data-tip);
      position: absolute;
      bottom: -30px;
      font-size: 11px;
      background: var(--text-primary);
      color: var(--bg-body);
      padding: 2px 8px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .game-link:hover::after {
      opacity: 1;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0.5;
      margin-top: 20px;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border-line);
      background: var(--bg-card);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 24px;
        margin: 20px 10px;
      }

      .game-card {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }

      .game-info {
        flex-direction: column;
        gap: 12px;
      }
    }
  </style>

  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body>
  <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
    <span id="themeIcon">🌙</span>
  </button>

  <div class="container">
    <a href="index.html" class="back-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
      返回主页
    </a>

    <header class="header">
      <h1>怀旧游戏</h1>
      <p>一边学习，一边用像素和代码重温那些纯粹的快乐。警告：部分关卡难度极高。</p>
    </header>

    <div class="games-list">
      <div class="game-card">
        <div class="game-info">
          <div class="game-icon-box">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L15 8H9L12 2Z" fill="currentColor" />
              <path d="M6 12L18 12L20 18L4 18L6 12Z" />
              <path d="M12 12V22" stroke-dasharray="2 2" />
            </svg>
          </div>
          <div class="game-title">小蜜蜂 · Galaga</div>
        </div>
        <div class="game-links">
          <a href="https://qizhen.xyz/galaga/" class="game-link" data-tip="开始游戏" target="_blank">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 3l14 9-14 9V3z" />
            </svg>
          </a>
          <a href="https://github.com/ruanqizhen/ruanqizhen/tree/main/galaga" class="game-link" data-tip="源代码"
            target="_blank">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path
                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22" />
            </svg>
          </a>
        </div>
      </div>

      <div class="game-card">
        <div class="game-info">
          <div class="game-icon-box">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="4" y="10" width="16" height="8" rx="2" />
              <rect x="8" y="6" width="8" height="4" rx="1" />
              <path d="M12 6V2M12 2H15" />
            </svg>
          </div>
          <div class="game-title">坦克大战 · Battle City</div>
        </div>
        <div class="game-links">
          <a href="https://tank.qizhen.xyz/" class="game-link" data-tip="开始游戏" target="_blank">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 3l14 9-14 9V3z" />
            </svg>
          </a>
          <a href="https://github.com/ruanqizhen/tank" class="game-link" data-tip="源代码" target="_blank">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 18l4-4-4-4M8 6l-4 4 4 4" />
            </svg>
          </a>
        </div>
      </div>

      <div class="game-card">
        <div class="game-info">
          <div class="game-icon-box">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <path d="M3 9h18M9 21V9" />
            </svg>
          </div>
          <div class="game-title">弹力砖块 · Brick Breaker</div>
        </div>
        <div class="game-links">
          <a href="https://brick.qizhen.xyz/" class="game-link" data-tip="开始游戏" target="_blank">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 3l14 9-14 9V3z" />
            </svg>
          </a>
          <a href="https://github.com/ruanqizhen/brick" class="game-link" data-tip="源代码" target="_blank">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path
                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22" />
            </svg>
          </a>
        </div>
      </div>
    </div>

    <footer>
      <p>qizhen.xyz - PRESS START TO PLAY</p>
    </footer>
  </div>

  <script>
    // 主题切换逻辑
    (function () {
      const toggle = document.getElementById('themeToggle');
      const icon = document.getElementById('themeIcon');
      const html = document.documentElement;

      const updateIcon = (isDark) => {
        icon.textContent = isDark ? '☀️' : '🌙';
      };

      updateIcon(html.classList.contains('dark'));

      toggle.addEventListener('click', () => {
        const isDark = html.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        updateIcon(isDark);
      });
    })();
  </script>
</body>

</html>
