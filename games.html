<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>游戏存档 | 阮奇桢</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="阮奇桢的个人练习项目：怀旧风格游戏作品集，包含小蜜蜂、坦克大战、弹力砖块。">
  <meta name="keywords" content="阮奇桢, 游戏, 小蜜蜂, 坦克大战, 弹力砖块, HTML5游戏, 游戏开发">
  <link rel="canonical" href="https://qizhen.xyz/games" />

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">

  <style>
    :root {
      --bg-body: #f8fafc;
      --bg-card: rgba(255, 255, 255, 0.7);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-accent: #d97706;
      --border-line: rgba(226, 232, 240, 0.8);
      --shadow-card: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
      --shadow-hover: 0 20px 25px -5px rgba(217, 119, 6, 0.1), 0 8px 10px -6px rgba(217, 119, 6, 0.05);
      --gradient-accent: linear-gradient(135deg, #d97706, #f59e0b);
      --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --bg-gradient-start: #f1f5f9;
      --bg-gradient-end: #e2e8f0;
    }

    html.dark {
      --bg-body: #020617;
      --bg-card: rgba(15, 23, 42, 0.8);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-accent: #fbbf24;
      --border-line: rgba(30, 41, 59, 0.8);
      --shadow-card: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      --shadow-hover: 0 20px 25px -5px rgba(251, 191, 36, 0.15), 0 8px 10px -6px rgba(251, 191, 36, 0.1);
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text-primary);
      line-height: 1.6;
      background: var(--bg-body);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      transition: background 0.5s ease;
      position: relative;
      overflow-x: hidden;
    }

    /* 优化后的 CRT 扫描线效果 */
    body::after {
      content: " ";
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
      background-size: 100% 4px, 4px 100%;
      z-index: 1000;
      pointer-events: none;
      opacity: 0.2;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background: radial-gradient(circle at 50% 50%, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      opacity: 0.8;
    }

    .container {
      width: 100%;
      max-width: 720px;
      margin: 80px 20px;
      padding: 60px 50px;
      background: var(--bg-card);
      box-shadow: var(--shadow-card);
      border-radius: 24px;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      animation: fadeIn 0.8s var(--transition-smooth);
      border: 1px solid var(--border-line);
      position: relative;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 40px;
      transition: all 0.3s var(--transition-smooth);
      padding: 8px 16px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.03);
    }

    .dark .back-link {
      background: rgba(255, 255, 255, 0.03);
    }

    .back-link:hover {
      color: var(--text-accent);
      background: rgba(217, 119, 6, 0.1);
      transform: translateX(-4px);
    }

    .header {
      text-align: center;
      margin-bottom: 60px;
    }

    .header h1 {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 16px;
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 12px rgba(217, 119, 6, 0.2));
    }

    .header p {
      font-size: 16px;
      color: var(--text-secondary);
      max-width: 85%;
      margin: 0 auto;
      font-weight: 400;
    }

    .games-list {
      display: grid;
      gap: 28px;
      margin-bottom: 60px;
    }

    .game-card {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      padding: 32px;
      border: 1px solid var(--border-line);
      transition: all 0.4s var(--transition-smooth);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .game-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--gradient-accent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .game-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(217, 119, 6, 0.3);
      background: rgba(217, 119, 6, 0.02);
    }

    .game-card:hover::before {
      opacity: 1;
    }

    .game-info {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .game-icon-box {
      width: 60px;
      height: 60px;
      background: rgba(217, 119, 6, 0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-accent);
      transition: transform 0.3s;
    }

    .game-card:hover .game-icon-box {
      transform: rotate(5deg) scale(1.1);
    }

    .game-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .game-links {
      display: flex;
      gap: 16px;
    }

    .game-link {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: var(--bg-body);
      border: 1px solid var(--border-line);
      color: var(--text-secondary);
      transition: all 0.3s var(--transition-smooth);
      position: relative;
    }

    .game-link:hover {
      background: var(--text-accent);
      color: white;
      transform: scale(1.1);
      box-shadow: 0 8px 15px rgba(217, 119, 6, 0.2);
    }

    /* 改进后的 Tooltip */
    .game-link::after {
      content: attr(data-tip);
      position: absolute;
      bottom: -35px;
      font-size: 12px;
      font-weight: 500;
      background: var(--text-primary);
      color: var(--bg-body);
      padding: 4px 10px;
      border-radius: 6px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      white-space: nowrap;
      transform: translateY(-5px);
    }

    .game-link:hover::after {
      opacity: 1;
      transform: translateY(0);
    }

    footer {
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      opacity: 0.6;
      border-top: 1px solid var(--border-line);
      padding-top: 30px;
      letter-spacing: 2px;
    }

    .theme-toggle {
      position: fixed;
      top: 30px;
      right: 30px;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      border: 1px solid var(--border-line);
      background: var(--bg-card);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow-card);
      transition: all 0.3s;
    }

    .theme-toggle:hover {
      transform: rotate(15deg);
      border-color: var(--text-accent);
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 24px;
        margin: 20px 10px;
        border-radius: 0;
      }

      .game-card {
        flex-direction: column;
        gap: 24px;
        text-align: center;
        padding: 24px;
      }

      .game-info {
        flex-direction: column;
        gap: 16px;
      }

      .header h1 {
        font-size: 32px;
      }
    }
  </style>

  <script>
    // 立即执行以防止主题闪烁
    (function () {
      const savedTheme = localStorage.getItem('theme');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body>

    <footer>

  </main>

  <script>
    // 主题切换逻辑
    (function () {
      const toggle = document.getElementById('themeToggle');
      const icon = document.getElementById('themeIcon');
      const html = document.documentElement;

      const updateUI = (isDark) => {
        icon.textContent = isDark ? '☀️' : '🌙';
      };

      updateUI(html.classList.contains('dark'));

      toggle.addEventListener('click', () => {
        const isDark = html.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        updateUI(isDark);
      });
    })();
  </script>
</body>
