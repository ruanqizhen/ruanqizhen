<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="经典90坦克大战网页版重制，支持鼠标拖拽操作。">
  <meta name="author" content="阮奇桢 (Ruan Qizhen)">
  <title>90坦克 - Yanshan Retro Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div class="ambient-glow"></div>
  <div id="game-container">
    <div id="overlay">
      <div class="overlay-content">
        <div class="logo-section">
          <div class="tank-icon">⚔️</div>
          <h1 id="overlay-title">坦克大战</h1>
        </div>
        <div class="high-score-display">
          高分记录: <span id="main-high-score-val">0</span>
        </div>
        <button id="start-btn">
          <span class="btn-text">开始游戏</span>
          <span class="btn-glow"></span>
        </button>
        <div class="instructions">
          <div class="control-group">
            <span class="key">WASD / ↑↓←→</span> 移动坦克
          </div>
          <div class="control-group">
            <span class="key">鼠标拖拽 / 触屏拖拽</span> 移动坦克
          </div>
          <div class="control-group">
            <span class="key">空格 / 鼠标点击 / 触屏点击</span> 射击
          </div>
        </div>
        <a href="https://qizhen.xyz/" target="_blank" class="personal-link">
          <span>🌐</span> 访问我的个人主页
        </a>
      </div>
    </div>
    <canvas id="gameCanvas" width="600" height="800"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
