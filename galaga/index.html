<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小蜜蜂 - Galaga Retro Arcade</title>
    <style>
        :root {
            --bg-color: #050505;
            --primary-glow: #00d4ff;
            --enemy-glow: #ff0055;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: var(--font-main);
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .score-box span {
            color: var(--primary-glow);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        #overlay.hidden {
            display: none;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff, var(--primary-glow));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.5));
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            border: 2px solid var(--primary-glow);
            color: var(--primary-glow);
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        button:hover {
            background: var(--primary-glow);
            color: black;
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .instructions {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
            line-height: 1.6;
        }

        #active-buffs {
            position: absolute;
            top: 70px;
            left: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            z-index: 5;
        }

        .buff-item {
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.3s ease;
        }

        .buff-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .buff-tag {
            padding: 2px 8px;
            border-radius: 4px;
            color: black;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        #buff-dual .buff-tag {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }

        #buff-rapid .buff-tag {
            background: #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
        }

        #buff-shield .buff-tag {
            background: #00d4ff;
            box-shadow: 0 0 10px #00d4ff;
        }
    </style>
    <script type="text/javascript">
        (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", "jxmn1qjx88");
    </script>
</head>

<body>

    <div id="game-container">
        <div id="hud">
            <div class="score-box">得分: <span id="current-score">0</span></div>
            <div class="score-box">关卡: <span id="current-level">1</span></div>
            <div class="score-box">最高分: <span id="high-score">0</span></div>
        </div>

        <div id="overlay">
            <h1 id="overlay-title">小蜜蜂</h1>
            <button id="start-btn">开始游戏</button>
            <div class="instructions">
                使用 键盘 或 拖拽 移动<br>
                空格 或 拖拽飞船时 自动射击<br>
                射击间隔 0.5 秒
            </div>
        </div>

        <div id="active-buffs">
            <div id="buff-dual" class="buff-item">
                <span class="buff-tag">双排</span> 双排火力: <span id="time-dual">0</span>s
            </div>
            <div id="buff-rapid" class="buff-item">
                <span class="buff-tag">极速</span> 极速射击: <span id="time-rapid">0</span>s
            </div>
            <div id="buff-shield" class="buff-item">
                <span class="buff-tag">护盾</span> 物理护盾: <span id="status-shield">已激活</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        // Configuration
        const CANVAS_WIDTH = 600;
        const CANVAS_HEIGHT = 800;
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;

        const scoreEl = document.getElementById('current-score');
        const levelEl = document.getElementById('current-level');
        const highScoreEl = document.getElementById('high-score');

        // Buff UI Elements
        const buffDualEl = document.getElementById('buff-dual');
        const timeDualEl = document.getElementById('time-dual');
        const buffRapidEl = document.getElementById('buff-rapid');
        const timeRapidEl = document.getElementById('time-rapid');
        const buffShieldEl = document.getElementById('buff-shield');

        let score = 0;
        let level = 1;
        let highScore = localStorage.getItem('galaga-high-score') || 0;
        highScoreEl.textContent = highScore;

        let gameActive = false;
        let animationId;
        let lastFireTime = 0;
        const FIRE_COOLDOWN = 500; // ms
        const pressedKeys = {};
        let touchX = null;
        let isDragging = false;

        // Assets
        const playerImg = new Image();
        playerImg.src = './player_ship.png';

        const enemyImg = new Image();
        enemyImg.src = './enemy_drone.png';

        const interceptorImg = new Image();
        interceptorImg.src = './enemy_interceptor.png';

        const commanderImg = new Image();
        commanderImg.src = './enemy_commander.png';

        // Audio System
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'shoot') {
                osc.className = 'square';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'explosion') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
        }

        // Game Classes
        class Player {
            constructor() {
                this.width = 50;
                this.height = 50;
                this.x = CANVAS_WIDTH / 2 - this.width / 2;
                this.y = CANVAS_HEIGHT - 80;
                this.speed = 3.5;
                this.dx = 0;

                // Power-up states
                this.shieldActive = false;
                this.dualShotTimer = 0;
                this.rapidFireTimer = 0;
            }

            draw() {
                if (playerImg.complete) {
                    ctx.drawImage(playerImg, this.x, this.y, this.width, this.height);
                } else {
                    ctx.fillStyle = '#00d4ff';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }

                // Shield Effect
                if (this.shieldActive) {
                    ctx.strokeStyle = '#00d4ff';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.x + this.width / 2, this.y + this.height / 2, this.width * 0.8, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#00d4ff';
                }

                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(0, 212, 255, 0.5)';
            }

            update() {
                this.x += this.dx;
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > CANVAS_WIDTH) this.x = CANVAS_WIDTH - this.width;
            }
        }

        class Projectile {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 4;
                this.height = 15;
                this.speed = 10;
            }

            draw() {
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00d4ff';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            update() {
                this.y -= this.speed;
            }
        }

        class EnemyProjectile {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 4;
                this.height = 12;
                this.speed = 4;
            }

            draw() {
                ctx.fillStyle = '#ff0055';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff0055';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            update() {
                this.y += this.speed;
            }
        }

        class Enemy {
            constructor(x, y, type = 1) {
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 40;
                this.speed = 2;
                this.type = type; // 1: Drone, 2: Interceptor, 3: Commander
                this.direction = 1;
                this.state = 'formation';
                this.diveSpeedX = 0;
                this.diveSpeedY = 5;

                // Type-specific properties
                if (type === 2) { // Interceptor
                    this.health = 1;
                    this.points = 150;
                    this.diveSpeedY = 7;
                    this.zigzagTimer = 0;
                } else if (type === 3) { // Commander
                    this.health = 2;
                    this.points = 400;
                    this.diveSpeedY = 4;
                    this.angle = 0;
                } else { // Drone
                    this.health = 1;
                    this.points = 100;
                }
                this.maxHealth = this.health;
            }

            draw() {
                ctx.save();
                let img = enemyImg;
                if (this.type === 2) img = interceptorImg;
                if (this.type === 3) img = commanderImg;

                // Position context at the center of the enemy to rotate
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.rotate(Math.PI); // Rotate 180 degrees (head down)

                // Unity style: Add subtle neon glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.type === 3 ? '#a020f0' : (this.type === 2 ? '#00d4ff' : '#ffaa00');

                // Apply filter to Drone to make it yellow again (original purple bee sprite)
                if (this.type === 1) {
                    ctx.filter = 'sepia(0.5) saturate(2) hue-rotate(-10deg) brightness(1.2)';
                }

                if (img.complete) {
                    ctx.drawImage(img, -this.width / 2, -this.height / 2, this.width, this.height);
                } else {
                    ctx.fillStyle = ctx.shadowColor;
                    ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                }

                ctx.restore();

                // Health bar for Commander (drawn above in world space)
                if (this.type === 3 && this.health < this.maxHealth) {
                    ctx.save();
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(this.x, this.y - 10, this.width, 4);
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(this.x, this.y - 10, this.width * (this.health / this.maxHealth), 4);
                    ctx.restore();
                }
            }

            update() {
                if (this.state === 'formation') {
                    this.x += this.speed * this.direction;
                    this.y += 0.2;

                    let diveProb = (0.0001 + (this.type === 2 ? 0.0002 : 0)) * level;
                    if (Math.random() < diveProb) {
                        this.state = 'diving';
                        if (this.type === 1) {
                            this.diveSpeedX = (player.x - this.x) / 60;
                        } else if (this.type === 2) {
                            this.diveSpeedX = (player.x - this.x) / 40;
                        }
                    }
                } else if (this.state === 'diving') {
                    if (this.type === 2) { // Zigzag
                        this.zigzagTimer += 0.1;
                        this.x += Math.sin(this.zigzagTimer) * 5 + (player.x - this.x) / 80;
                        this.y += this.diveSpeedY;
                    } else if (this.type === 3) { // Spiral/Circle
                        this.angle += 0.05;
                        this.x += Math.cos(this.angle) * 3 + (player.x - this.x) / 100;
                        this.y += this.diveSpeedY;
                    } else {
                        this.x += this.diveSpeedX;
                        this.y += this.diveSpeedY;
                    }

                    if (this.y > CANVAS_HEIGHT) {
                        this.y = -this.height;
                        this.state = 'formation';
                    }
                }

                let bombProb = 0.0005 + (level * 0.0005) + (this.type === 3 ? 0.001 : 0);
                if (Math.random() < bombProb) {
                    enemyProjectiles.push(new EnemyProjectile(this.x + this.width / 2, this.y + this.height));
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 6;
                this.speedY = (Math.random() - 0.5) * 6;
                this.life = 1.0;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class PowerUp {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // 'D': Dual, 'S': Shield, 'R': Rapid
                this.width = 30;
                this.height = 30;
                this.speed = 2;
            }

            draw() {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.type === 'D' ? '#00ff00' : (this.type === 'S' ? '#00d4ff' : '#ff00ff');
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 20px Inter';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // Draw circle background
                ctx.strokeStyle = ctx.shadowColor;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2, this.y + this.height / 2, this.width / 2, 0, Math.PI * 2);
                ctx.stroke();

                ctx.fillText(this.type, this.x + this.width / 2, this.y + this.height / 2);
                ctx.restore();
            }

            update() {
                this.y += this.speed;
            }
        }

        // Starfield Background
        const stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * CANVAS_WIDTH,
                y: Math.random() * CANVAS_HEIGHT,
                size: Math.random() * 2,
                speed: Math.random() * 2 + 1
            });
        }

        function drawStars() {
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if (star.y > CANVAS_HEIGHT) star.y = 0;
            });
        }

        // Game Instances
        let player = new Player();
        let projectiles = [];
        let enemyProjectiles = [];
        let enemies = [];
        let particles = [];
        let powerUps = [];
        let enemyDirection = 1;
        let enemyMoveDown = false;

        function initEnemies() {
            enemies = [];
            const rows = 4;
            const cols = 8;
            const spacingX = 60;
            const spacingY = 50;
            const offsetX = (CANVAS_WIDTH - (cols * spacingX)) / 2;

            for (let r = 0; r < rows; r++) {
                let type = 1;
                if (r === 0) type = 3; // Back row: Commanders
                else if (r === 1) type = 2; // Second row: Interceptors

                for (let c = 0; c < cols; c++) {
                    enemies.push(new Enemy(offsetX + c * spacingX, 70 + r * spacingY, type));
                }
            }
        }

        function handleCollisions() {
            projectiles.forEach((p, pIdx) => {
                enemies.forEach((e, eIdx) => {
                    if (p.x < e.x + e.width &&
                        p.x + p.width > e.x &&
                        p.y < e.y + e.height &&
                        p.y + p.height > e.y) {

                        // Hit!
                        e.health--;
                        if (e.health <= 0) {
                            playSound('explosion');
                            createExplosion(e.x + e.width / 2, e.y + e.height / 2, e.type === 3 ? '#a020f0' : (e.type === 2 ? '#00d4ff' : '#ffaa00'));
                            score += e.points;
                            enemies.splice(eIdx, 1);

                            // Drop Power-up
                            if (Math.random() < 0.1) {
                                const types = ['D', 'S', 'R'];
                                const type = types[Math.floor(Math.random() * types.length)];
                                powerUps.push(new PowerUp(e.x, e.y, type));
                            }

                            if (score > highScore) {
                                highScore = score;
                                localStorage.setItem('galaga-high-score', highScore);
                                highScoreEl.textContent = highScore;
                            }
                        } else {
                            // Visual feedback for non-lethal hit
                            ctx.fillStyle = '#fff';
                            ctx.fillRect(e.x, e.y, e.width, e.height);
                        }

                        projectiles.splice(pIdx, 1);
                        scoreEl.textContent = score;
                    }
                });
            });

            enemies.forEach(e => {
                if (e.y + e.height > player.y &&
                    e.x < player.x + player.width &&
                    e.x + e.width > player.x) {
                    if (player.shieldActive) {
                        player.shieldActive = false;
                        enemies.splice(enemies.indexOf(e), 1);
                        createExplosion(e.x + e.width / 2, e.y + e.height / 2, '#ffaa00');
                    } else {
                        gameOver();
                    }
                }
                if (e.y > CANVAS_HEIGHT) {
                    gameOver();
                }
            });

            enemyProjectiles.forEach((ep, idx) => {
                if (ep.x < player.x + player.width &&
                    ep.x + ep.width > player.x &&
                    ep.y < player.y + player.height &&
                    ep.y + ep.height > player.y) {
                    if (player.shieldActive) {
                        player.shieldActive = false;
                        enemyProjectiles.splice(idx, 1);
                        createExplosion(ep.x, ep.y, '#00d4ff');
                    } else {
                        gameOver();
                    }
                }
            });

            // Power-up collection
            powerUps.forEach((pu, idx) => {
                if (pu.x < player.x + player.width &&
                    pu.x + pu.width > player.x &&
                    pu.y < player.y + player.height &&
                    pu.y + pu.height > player.y) {

                    if (pu.type === 'D') player.dualShotTimer = Date.now() + 10000;
                    if (pu.type === 'S') player.shieldActive = true;
                    if (pu.type === 'R') player.rapidFireTimer = Date.now() + 8000;

                    powerUps.splice(idx, 1);
                    playSound('shoot'); // Reuse sound for collection
                }
            });
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function update() {
            if (!gameActive) return;

            const now = Date.now();

            // Update Buff UI
            if (player.dualShotTimer > now) {
                buffDualEl.classList.add('visible');
                timeDualEl.textContent = Math.ceil((player.dualShotTimer - now) / 1000);
            } else {
                buffDualEl.classList.remove('visible');
            }

            if (player.rapidFireTimer > now) {
                buffRapidEl.classList.add('visible');
                timeRapidEl.textContent = Math.ceil((player.rapidFireTimer - now) / 1000);
            } else {
                buffRapidEl.classList.remove('visible');
            }

            if (player.shieldActive) {
                buffShieldEl.classList.add('visible');
            } else {
                buffShieldEl.classList.remove('visible');
            }

            // Handle Input State
            if (pressedKeys['ArrowLeft']) player.dx = -player.speed;
            else if (pressedKeys['ArrowRight']) player.dx = player.speed;
            else player.dx = 0;

            if (pressedKeys[' ']) {
                const now = Date.now();
                const cooldown = player.rapidFireTimer > now ? 100 : FIRE_COOLDOWN;
                if (now - lastFireTime >= cooldown) {
                    if (player.dualShotTimer > now) {
                        projectiles.push(new Projectile(player.x + 5, player.y));
                        projectiles.push(new Projectile(player.x + player.width - 9, player.y));
                    } else {
                        projectiles.push(new Projectile(player.x + player.width / 2 - 2, player.y));
                    }
                    playSound('shoot');
                    lastFireTime = now;
                }
            }

            player.update();
            projectiles.forEach((p, idx) => {
                p.update();
                if (p.y < 0) projectiles.splice(idx, 1);
            });

            powerUps.forEach((pu, idx) => {
                pu.update();
                if (pu.y > CANVAS_HEIGHT) powerUps.splice(idx, 1);
            });

            enemyProjectiles.forEach((ep, idx) => {
                ep.update();
                if (ep.y > CANVAS_HEIGHT) enemyProjectiles.splice(idx, 1);
            });

            let hitWall = false;
            enemies.forEach(e => {
                e.update();
                if (e.x + e.width > CANVAS_WIDTH || e.x < 0) hitWall = true;
            });

            if (hitWall) {
                enemies.forEach(e => {
                    e.direction *= -1;
                    e.y += 10;
                });
            }

            particles.forEach((p, idx) => {
                p.update();
                if (p.life <= 0) particles.splice(idx, 1);
            });

            handleCollisions();

            if (enemies.length === 0) {
                level++;
                levelEl.textContent = level;
                initEnemies(); // Next wave
            }
        }

        function draw() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            drawStars();

            player.draw();
            projectiles.forEach(p => p.draw());
            enemyProjectiles.forEach(ep => ep.draw());
            powerUps.forEach(pu => pu.draw());
            enemies.forEach(e => e.draw());
            particles.forEach(p => p.draw());
        }

        function gameLoop() {
            if (!gameActive) return;
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            gameActive = true;
            score = 0;
            level = 1;
            scoreEl.textContent = score;
            levelEl.textContent = level;
            initEnemies();
            player = new Player();
            projectiles = [];
            enemyProjectiles = [];
            powerUps = [];
            particles = [];
            overlay.classList.add('hidden');
            gameLoop();
        }

        function gameOver() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            overlay.classList.remove('hidden');
            overlayTitle.textContent = '游戏结束';
            startBtn.textContent = '重新开始';
        }

        // Controls
        window.addEventListener('keydown', e => {
            if (['ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                pressedKeys[e.key] = true;
                if (e.key === ' ') e.preventDefault();
            }
        });

        window.addEventListener('keyup', e => {
            if (['ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                pressedKeys[e.key] = false;
            }
        });

        // Touch Controls
        canvas.addEventListener('touchstart', e => {
            if (!gameActive) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (touch.clientX - rect.left) * scaleX;
            const y = (touch.clientY - rect.top) * scaleY;

            // Check if tapping on player
            if (x >= player.x && x <= player.x + player.width &&
                y >= player.y && y <= player.y + player.height) {
                const now = Date.now();
                const cooldown = player.rapidFireTimer > now ? 100 : FIRE_COOLDOWN;
                if (now - lastFireTime >= cooldown) {
                    if (player.dualShotTimer > now) {
                        projectiles.push(new Projectile(player.x + 5, player.y));
                        projectiles.push(new Projectile(player.x + player.width - 9, player.y));
                    } else {
                        projectiles.push(new Projectile(player.x + player.width / 2 - 2, player.y));
                    }
                    playSound('shoot');
                    lastFireTime = now;
                }
            }

            touchX = x;
            isDragging = true;
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            if (!gameActive || !isDragging) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const x = (touch.clientX - rect.left) * scaleX;

            const deltaX = x - touchX;
            player.x += deltaX;

            // Boundary constraints
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > CANVAS_WIDTH) player.x = CANVAS_WIDTH - player.width;

            // Auto-shoot during drag
            const now = Date.now();
            if (now - lastFireTime >= FIRE_COOLDOWN) {
                projectiles.push(new Projectile(player.x + player.width / 2 - 2, player.y));
                playSound('shoot');
                lastFireTime = now;
            }

            touchX = x;
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
            touchX = null;
        });

        // Mouse Controls for Dragging
        canvas.addEventListener('mousedown', e => {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            // Check if clicking on player
            if (x >= player.x && x <= player.x + player.width &&
                y >= player.y && y <= player.y + player.height) {
                const now = Date.now();
                const cooldown = player.rapidFireTimer > now ? 100 : FIRE_COOLDOWN;
                if (now - lastFireTime >= cooldown) {
                    if (player.dualShotTimer > now) {
                        projectiles.push(new Projectile(player.x + 5, player.y));
                        projectiles.push(new Projectile(player.x + player.width - 9, player.y));
                    } else {
                        projectiles.push(new Projectile(player.x + player.width / 2 - 2, player.y));
                    }
                    playSound('shoot');
                    lastFireTime = now;
                }
            }

            touchX = x;
            isDragging = true;
        });

        window.addEventListener('mousemove', e => {
            if (!gameActive || !isDragging) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const x = (e.clientX - rect.left) * scaleX;

            const deltaX = x - touchX;
            player.x += deltaX;

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > CANVAS_WIDTH) player.x = CANVAS_WIDTH - player.width;

            // Auto-shoot during drag
            const now = Date.now();
            if (now - lastFireTime >= FIRE_COOLDOWN) {
                projectiles.push(new Projectile(player.x + player.width / 2 - 2, player.y));
                playSound('shoot');
                lastFireTime = now;
            }

            touchX = x;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            touchX = null;
        });

        startBtn.addEventListener('click', startGame);

    </script>
