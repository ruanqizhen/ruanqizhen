<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小蜜蜂 - Galaga Retro Arcade</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript">
        (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", "jxmn1qjx88");
    </script>
</head>

<body>

    <div id="game-container">
        <div id="hud">
            <div class="score-box">得分: <span id="current-score">0</span></div>
            <div class="score-box">关卡: <span id="current-level">1</span></div>
            <div class="score-box">最高分: <span id="high-score">0</span></div>
        </div>

        <div id="overlay">
            <h1 id="overlay-title">小蜜蜂</h1>
            <button id="start-btn">开始游戏</button>
            <div class="instructions">
                使用 键盘 或 拖拽 移动<br>
                空格 或 拖拽飞船时 自动射击<br>
                射击间隔 0.5 秒
            </div>
        </div>

        <div id="active-buffs">
            <div id="buff-dual" class="buff-item">
                <span class="buff-tag">双排</span> 双排火力: <span id="time-dual">0</span>s
            </div>
            <div id="buff-rapid" class="buff-item">
                <span class="buff-tag">极速</span> 极速射击: <span id="time-rapid">0</span>s
            </div>
            <div id="buff-shield" class="buff-item">
                <span class="buff-tag">护盾</span> 物理护盾: <span id="status-shield">已激活</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="script.js"></script>
    <script async src="https://hm.baidu.com/hm.js?b3f6e7ec9302021671173e3fad14f4cd"></script>
</body>

</html>
