<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>阮奇桢 | 个人主页</title>
  <meta name="description" content="阮奇桢的个人主页：墨卷、雅集、拾遗——于山水之间，写代码、读文章、记浮生。">
  <meta name="keywords" content="阮奇桢, LabVIEW, Python, 编程教程, 个人博客, 技术教程, 文学创作">
  <meta property="og:title" content="阮奇桢 | 个人主页">
  <meta property="og:description" content="技术教程、文学创作与生活随笔">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://qizhen.xyz">
  <meta property="og:image" content="https://qizhen.xyz/assets/seal_web.png">
  <link rel="icon" href="assets/seal_web.png">
  <link rel="canonical" href="https://qizhen.xyz/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;700&family=Zhi+Mang+Xing&family=Long+Cang&family=Ma+Shan+Zheng&display=swap"
    rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --paper: #f4f1e8;
      --paper-edge: #d8d0c2;
      --seal-red: #a03020;
      --seal-text-color: rgba(248, 235, 225, 0.92);
      --transition-dur: 2.2s;
      /* 文字層 */
      --text-primary: #2a2418;
      --text-secondary: #5a5040;
      --text-link: #3a352a;
      --text-link-hover: #6a4030;
      --text-shadow: 0 1px 3px rgba(245, 240, 232, 0.5);
      --card-bg: rgba(245, 240, 232, 0.55);
      --card-border: rgba(160, 140, 110, 0.30);
      --card-hover-bg: rgba(245, 240, 232, 0.78);
      --card-hover-border: rgba(140, 100, 60, 0.50);
      --scroll-track: rgba(160, 140, 110, 0.15);
      --scroll-thumb: rgba(140, 120, 90, 0.35);
    }

    .night-mode {
      --paper: #2b2018;
      --paper-edge: #a08868;
      --seal-red: #8a2818;
      --seal-text-color: rgba(240, 220, 200, 0.85);
      --text-primary: #f2e8d4;
      --text-secondary: #d8c8a8;
      --text-link: #e8dcc0;
      --text-link-hover: #f0c878;
      --text-shadow: 0 1px 4px rgba(15, 8, 0, 0.55);
      --card-bg: rgba(35, 22, 12, 0.45);
      --card-border: rgba(150, 115, 70, 0.45);
      --card-hover-bg: rgba(45, 30, 18, 0.60);
      --card-hover-border: rgba(200, 150, 80, 0.55);
      --scroll-track: rgba(80, 55, 30, 0.25);
      --scroll-thumb: rgba(140, 110, 70, 0.45);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--paper);
      transition: background var(--transition-dur) ease;
      font-family: 'LXGW WenKai TC', 'Kaiti SC', 'STKaiti', 'KaiTi', '楷体', 'STSong', 'SimSun', 'Songti SC', 'Noto Serif CJK SC', serif;
    }

    /* ==========================================================
       背景层 —— AI 水墨长卷 双图交叉淡入
       ========================================================== */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .scene-img {
      position: absolute;
      inset: -2.5%;
      width: 105%;
      height: 105%;
      background-size: cover;
      background-position: center 38%;
      transition: opacity var(--transition-dur) ease, transform 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .scene-day {
      background-image: url('assets/bg-day.jpg');
      opacity: 1;
    }

    .scene-night {
      background-image: url('assets/bg-night.jpg');
      opacity: 0;
    }

    .night-mode .scene-day {
      opacity: 0;
    }

    .night-mode .scene-night {
      opacity: 1;
    }

    /* 宣纸纤维纹理 + 四周暗角（裱边感） */
    .scene::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      background:
        repeating-linear-gradient(90deg, transparent 0, transparent 3px, rgba(120, 110, 90, 0.018) 3px, rgba(120, 110, 90, 0.018) 4px),
        repeating-linear-gradient(0deg, transparent 0, transparent 5px, rgba(110, 100, 80, 0.015) 5px, rgba(110, 100, 80, 0.015) 6px);
      box-shadow:
        inset 0 0 110px rgba(60, 55, 40, 0.22),
        inset 0 0 320px rgba(60, 55, 40, 0.10);
    }

    /* ==========================================================
       漂移雾霭 —— 两条横向雾带增添动感
       ========================================================== */
    @keyframes mistDrift1 {

      0%,
      100% {
        transform: translateX(-2%);
        opacity: 0.55;
      }

      50% {
        transform: translateX(3%);
        opacity: 0.75;
      }
    }

    @keyframes mistDrift2 {

      0%,
      100% {
        transform: translateX(2%);
        opacity: 0.40;
      }

      50% {
        transform: translateX(-3%);
        opacity: 0.60;
      }
    }

    .mist {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(34px);
      z-index: 3;
    }

    .mist-1 {
      left: -5%;
      bottom: 30%;
      width: 75%;
      height: 9%;
      background: radial-gradient(ellipse 80% 60% at 45% 50%, rgba(250, 248, 242, 0.85) 0%, transparent 100%);
      animation: mistDrift1 26s ease-in-out infinite;
    }

    .mist-2 {
      right: -8%;
      bottom: 38%;
      width: 60%;
      height: 7%;
      background: radial-gradient(ellipse 75% 55% at 55% 50%, rgba(250, 248, 242, 0.70) 0%, transparent 100%);
      animation: mistDrift2 32s ease-in-out infinite;
    }

    .night-mode .mist-1,
    .night-mode .mist-2 {
      background: radial-gradient(ellipse 78% 58% at 50% 50%, rgba(120, 90, 55, 0.35) 0%, transparent 100%);
    }

    @keyframes cardEnter {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== 主畫布（內容層包装） ===== */
    .canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      z-index: 10;
      pointer-events: none;
    }

    @keyframes titleReveal {
      0% {
        opacity: 0;
        filter: blur(8px);
      }

      40% {
        opacity: 0;
        filter: blur(8px);
      }

      100% {
        opacity: 0.4;
        filter: blur(0);
      }
    }

    .title-container {
      position: fixed;
      top: 8vh;
      left: 40px;
      z-index: 2;
      opacity: 0.4;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: titleReveal 4s ease-out;
    }

    .main-title {
      font-family: 'Zhi Mang Xing', 'Long Cang', 'Ma Shan Zheng', cursive;
      font-size: 6vh;
      font-weight: 700;
      letter-spacing: 1vh;
      color: var(--text-primary);
      transition: color var(--transition-dur) ease;
      text-shadow: var(--text-shadow);
      writing-mode: vertical-rl;
    }

    /* 印章 */
    .seal-img {
      margin-top: 2vh;
      width: 6vh;
      height: auto;
      filter: drop-shadow(1px 2px 4px rgba(80, 20, 15, 0.25));
      opacity: 0.95;
    }

    /* 卡片列（父級 .title-bg 設置了 writing-mode: vertical-rl，
       因此 flex-direction: column 實際呈現為橫向佈局，overflow-x 控制橫向滾動） */
    .card-column {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 20px 8px;
      flex-shrink: 0;
      gap: 12px;
      pointer-events: auto;
      overflow-x: auto;
      overflow-y: auto;
      max-height: 90vh;
      max-width: 100vw;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
      user-select: none;
    }

    .card-column:active {
      cursor: grabbing;
    }

    .card-column::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    .card-column::-webkit-scrollbar-track {
      background: var(--scroll-track);
      border-radius: 2px;
    }

    .card-column::-webkit-scrollbar-thumb {
      background: var(--scroll-thumb);
      border-radius: 2px;
    }

    .card {
      text-decoration: none;
      color: var(--text-primary);
      background:
        /* 木纹基底 */
        repeating-linear-gradient(2deg, transparent 0, transparent 6px, rgba(140, 110, 70, 0.025) 6px, rgba(140, 110, 70, 0.025) 8px),
        repeating-linear-gradient(88deg, transparent 0, transparent 14px, rgba(120, 90, 55, 0.018) 14px, rgba(120, 90, 55, 0.018) 15px),
        var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 4px;
      padding: 18px 16px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: all 0.4s ease;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      min-height: 0;
      flex-shrink: 0;
      opacity: 0;
      transform: translateY(12px);
      animation: cardEnter 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    /* 內框：雙線陰刻凹槽 */
    .card::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px solid var(--card-border);
      opacity: 0.35;
      pointer-events: none;
      transition: all 0.4s ease;
      z-index: 1;
      border-radius: 2px;
      box-shadow: inset 0 0 0 2px transparent;
    }

    .card:hover::before {
      opacity: 0.7;
      border-color: var(--card-hover-border);
      box-shadow: inset 0 0 0 2px rgba(180, 140, 80, 0.08);
    }

    /* 角花：三層回紋銅飾 */
    .card-corner {
      position: absolute;
      width: 12px;
      height: 12px;
      border: 1.4px solid var(--card-border);
      pointer-events: none;
      opacity: 0.55;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 2;
    }

    /* 第二層回紋 */
    .card-corner::before {
      content: '';
      position: absolute;
      width: 5px;
      height: 5px;
      border: 1px solid var(--card-border);
    }

    /* 角釘（銅釘圓點） */
    .card-corner::after {
      content: '';
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--card-border);
      opacity: 0.55;
    }

    .card-corner.tl {
      top: 9px;
      left: 9px;
      border-right: none;
      border-bottom: none;
    }

    .card-corner.tl::before {
      top: 3px;
      left: 3px;
      border-right: none;
      border-bottom: none;
    }

    .card-corner.tl::after {
      top: 0;
      left: 0;
      transform: translate(-40%, -40%);
    }

    .card-corner.tr {
      top: 9px;
      right: 9px;
      border-left: none;
      border-bottom: none;
    }

    .card-corner.tr::before {
      top: 3px;
      right: 3px;
      border-left: none;
      border-bottom: none;
    }

    .card-corner.tr::after {
      top: 0;
      right: 0;
      transform: translate(40%, -40%);
    }

    .card-corner.bl {
      bottom: 9px;
      left: 9px;
      border-right: none;
      border-top: none;
    }

    .card-corner.bl::before {
      bottom: 3px;
      left: 3px;
      border-right: none;
      border-top: none;
    }

    .card-corner.bl::after {
      bottom: 0;
      left: 0;
      transform: translate(-40%, 40%);
    }

    .card-corner.br {
      bottom: 9px;
      right: 9px;
      border-left: none;
      border-top: none;
    }

    .card-corner.br::before {
      bottom: 3px;
      right: 3px;
      border-left: none;
      border-top: none;
    }

    .card-corner.br::after {
      bottom: 0;
      right: 0;
      transform: translate(40%, 40%);
    }

    /* 悬停：角花微張、泛起銅紅色澤 */
    .card:hover .card-corner {
      opacity: 0.9;
      border-color: var(--seal-red);
    }

    .card:hover .card-corner::before {
      border-color: var(--seal-red);
    }

    .card:hover .card-corner::after {
      background: var(--seal-red);
      opacity: 0.8;
    }

    .card:hover .card-corner.tl {
      top: 6px;
      left: 6px;
    }

    .card:hover .card-corner.tr {
      top: 6px;
      right: 6px;
    }

    .card:hover .card-corner.bl {
      bottom: 6px;
      left: 6px;
    }

    .card:hover .card-corner.br {
      bottom: 6px;
      right: 6px;
    }

    .card:nth-child(1) {
      animation-delay: 0.18s;
    }

    .card:nth-child(2) {
      animation-delay: 0.30s;
    }

    .card:nth-child(3) {
      animation-delay: 0.42s;
    }

    .card:nth-child(4) {
      animation-delay: 0.54s;
    }

    .card:nth-child(5) {
      animation-delay: 0.66s;
    }

    .card:nth-child(6) {
      animation-delay: 0.78s;
    }

    .card:nth-child(7) {
      animation-delay: 0.90s;
    }

    .card:hover {
      background: var(--card-hover-bg);
      border-color: var(--card-hover-border);
      box-shadow:
        0 6px 24px rgba(80, 60, 30, 0.14),
        0 0 40px rgba(180, 140, 80, 0.10),
        0 0 80px rgba(200, 160, 100, 0.06);
      transform: translateY(-4px) translateX(-1px);
    }

    .card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 7px;
      background: radial-gradient(ellipse 60% 40% at 50% 80%, rgba(200, 150, 80, 0.12) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: -1;
    }

    .card:hover::after {
      opacity: 1;
    }

    .card:visited {
      border-left-color: rgba(160, 120, 60, 0.25);
    }

    .card:focus-visible {
      outline: 2px solid var(--seal-red);
      outline-offset: 4px;
      border-radius: 5px;
    }

    .card-column:focus-visible {
      outline: 2px solid var(--seal-red);
      outline-offset: -2px;
      border-radius: 6px;
    }

    .toggle-btn:focus-visible {
      outline: 2px solid var(--seal-red);
      outline-offset: 6px;
      border-radius: 50%;
    }

    /* 文字選中色 */
    ::selection {
      background: rgba(160, 120, 60, 0.22);
      color: var(--text-primary);
    }

    .night-mode ::selection {
      background: rgba(200, 150, 80, 0.28);
      color: var(--text-primary);
    }

    .card-header {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--text-primary);
      transition: color var(--transition-dur) ease;
      line-height: 1.4;
    }

    .card:hover .card-title {
      color: var(--text-link-hover);
    }

    .card-tag {
      font-size: 12px;
      padding: 2px 5px;
      border-radius: 3px;
      font-weight: 500;
      letter-spacing: 2px;
      display: inline-block;
      line-height: 1.4;
    }

    .card-tag.book {
      background: rgba(160, 120, 60, 0.12);
      color: var(--text-link-hover);
    }

    .card-tag.web {
      background: rgba(100, 120, 140, 0.12);
      color: var(--text-secondary);
    }

    .card-tag.game {
      background: rgba(180, 140, 60, 0.12);
      color: #8a6830;
    }

    .card-tag.blog {
      background: rgba(110, 140, 120, 0.12);
      color: #588068;
    }


    /* ===== 開場霧散 ===== */
    @keyframes mistLift {
      0% {
        opacity: 1;
        filter: blur(0);
      }

      60% {
        opacity: 0.85;
        filter: blur(12px);
      }

      100% {
        opacity: 0;
        filter: blur(28px);
        visibility: hidden;
      }
    }

    .opening-mist {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(248, 245, 238, 0.97) 0%, rgba(245, 242, 232, 0.92) 50%, rgba(240, 236, 225, 0.85) 100%);
      animation: mistLift 1.6s ease-out forwards;
      animation-delay: 0.3s;
    }

    .night-mode .opening-mist {
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(40, 28, 15, 0.97) 0%, rgba(35, 24, 12, 0.92) 50%, rgba(30, 20, 10, 0.85) 100%);
    }


    .card-desc {
      font-family: 'LiSu', '隶书', 'SimLi', 'Baoli SC', '华文宝丽', 'Libian SC', '隶变-简', 'STLiti', '华文隶书', 'LXGW WenKai TC', cursive, serif;
      font-size: 16px;
      color: var(--text-secondary);
      letter-spacing: 2px;
      line-height: 1.8;
      opacity: 0.75;
      transition: color var(--transition-dur) ease;
    }

    /* ===== 晝夜切換按鈕 ===== */
    .toggle-btn {
      position: fixed;
      top: 50px;
      right: 80px;
      width: 72px;
      height: 72px;
      border: none;
      background: transparent;
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      line-height: 1;
      color: var(--seal-red);
      transition: all 0.4s ease;
      pointer-events: auto;
    }

    .toggle-btn:hover {
      transform: scale(1.15);
    }

    /* 光晕背景，融入背景图 */
    .toggle-btn::before {
      content: '';
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      z-index: -1;
      transition: background var(--transition-dur) ease, opacity var(--transition-dur) ease;
      background: radial-gradient(circle, rgba(242, 114, 92, 0.55) 0%, rgba(242, 114, 92, 0.2) 35%, rgba(242, 114, 92, 0.05) 60%, transparent 80%);
      pointer-events: none;
    }

    .night-mode .toggle-btn::before {
      background: radial-gradient(circle, rgba(246, 227, 168, 0.5) 0%, rgba(246, 227, 168, 0.18) 35%, rgba(246, 227, 168, 0.04) 60%, transparent 80%);
    }

    .toggle-btn .icon-sun,
    .toggle-btn .icon-moon {
      transition: opacity 0.4s ease, color var(--transition-dur) ease, filter var(--transition-dur) ease;
      position: absolute;
    }

    .toggle-btn .icon-sun {
      color: #fff0eb;
      filter: drop-shadow(0 0 10px rgba(242, 114, 92, 0.9)) drop-shadow(0 0 25px rgba(242, 114, 92, 0.7)) drop-shadow(0 0 45px rgba(242, 114, 92, 0.4));
    }

    .toggle-btn .icon-moon {
      opacity: 0;
    }

    .night-mode .toggle-btn .icon-sun {
      opacity: 0;
    }

    .night-mode .toggle-btn .icon-moon {
      opacity: 1;
      color: #fffae8;
      filter: drop-shadow(0 0 10px rgba(246, 227, 168, 0.95)) drop-shadow(0 0 25px rgba(246, 227, 168, 0.7)) drop-shadow(0 0 45px rgba(246, 227, 168, 0.4));
    }

    @keyframes toggleSpin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .toggle-btn.spinning {
      animation: toggleSpin 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }



    .title-bg {
      position: absolute;
      top: 46%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      z-index: 10;
      pointer-events: none;
      writing-mode: vertical-rl;
      max-width: 100vw;
    }

    /* ===== 橫向滾動提示 ===== */
    .scroll-hint {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 180;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.7;
      transition: opacity 1.5s ease;
      animation: hintPulse 2.5s ease-in-out infinite;
      writing-mode: horizontal-tb;
    }

    .scroll-hint.fading {
      opacity: 0;
    }

    @keyframes hintPulse {

      0%,
      100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(12px);
      }
    }

    .scroll-hint-arrow {
      font-size: 18px;
      color: var(--text-secondary);
      line-height: 1;
    }

    .scroll-hint-text {
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 2px;
    }

    /* ===== 響應式 ===== */
    @media (max-width: 900px) {
      .title-container {
        top: 8vh;
        left: 20px;
      }

      .card-title {
        font-size: 18px;
        letter-spacing: 3px;
      }

      .card-desc {
        font-size: 15px;
      }

      .card-tag {
        font-size: 11px;
        padding: 2px 4px;
      }

      .scroll-hint {
        bottom: 20px;
        right: 16px;
      }

      .scroll-hint-text {
        font-size: 12px;
      }

      .title-bg {
        top: 46%;
        left: 50%;
        transform: translate(-50%, -50%);
        right: auto;
      }
    }

    @media (max-width: 500px) {
      .title-container {

  <script>
      // 晝夜切換
      (function () {
        const btn = document.getElementById('toggleBtn');

        btn.addEventListener('click', function () {
          const isNight = document.documentElement.classList.toggle('night-mode');
          localStorage.setItem('theme', isNight ? 'dark' : 'light');
          if (isNight) {
            document.documentElement.dataset.nightMode = 'true';
          } else {
            delete document.documentElement.dataset.nightMode;
          }
          // 旋轉動畫
          btn.classList.add('spinning');
          btn.addEventListener('animationend', function () {
            btn.classList.remove('spinning');
          }, { once: true });
        });
      })();

      // 拖拽與滾動交互（支援小屏幕滾動優先，大屏幕整體拖拽回彈）
      (function () {
        const column = document.querySelector('.card-column');
        if (!column) return;

        let isDown = false;
        let startX = 0;
        let startY = 0;
        let startScrollLeft = 0;
        let moved = false;

        // ---- 慣性滾動（用於小屏幕滾動溢出時） ----
        let velX = 0;
        let lastX = 0;
        let lastTime = 0;
        let momentumId = null;

        function stopMomentum() {
          if (momentumId) {
            cancelAnimationFrame(momentumId);
            momentumId = null;
          }
        }

        function startMomentum() {
          if (Math.abs(velX) < 0.5) return;
          const friction = 0.94;
          const minVel = 0.3;

          function step() {
            if (isDown) return;
            velX *= friction;
            column.scrollLeft -= velX; // 慣性滾動與拉動方向一致

            if (Math.abs(velX) > minVel) {
              momentumId = requestAnimationFrame(step);
            } else {
              momentumId = null;
            }
          }
          momentumId = requestAnimationFrame(step);
        }

        // ---- 統一拖拽邏輯 ----
        function onStart(pageX, pageY) {
          stopMomentum();
          isDown = true;
          moved = false;
          startX = pageX;
          startY = pageY;
          startScrollLeft = column.scrollLeft;

          velX = 0;
          lastX = pageX;
          lastTime = Date.now();

          column.style.transition = 'none'; // 拖拽時取消過渡動畫

          // 立即清理任何正在進行的卡片波浪動畫與定時器
          const cards = column.querySelectorAll('.card');
          cards.forEach((card) => {
            if (card._bounceTimeout1) clearTimeout(card._bounceTimeout1);
            if (card._bounceTimeout2) clearTimeout(card._bounceTimeout2);
            if (card._bounceCleanup) {
              card.removeEventListener('transitionend', card._bounceCleanup);
              card._bounceCleanup();
            }
          });
        }

        function onMove(pageX, pageY) {
          if (!isDown) return;
          const dx = pageX - startX;
          const dy = pageY - startY;

          if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            moved = true;
          }

          // 判斷是否溢出（小屏幕）。使用 15px 閾值避免亞像素誤差
          const isOverflow = column.scrollWidth - column.clientWidth > 15;

          if (isOverflow) {
            // 1. 小屏幕情況下：左右滾動。在 vertical-rl 下，向右拉（dx > 0）是向左滾動（scrollLeft 減少，即 - dx）
            const targetScroll = startScrollLeft - dx * 1.5;
            const maxScrollLeft = column.clientWidth - column.scrollWidth; // vertical-rl 下最左側極限是負值

            let overscrollX = 0;
            if (targetScroll > 0) {
              overscrollX = targetScroll;
              column.scrollLeft = 0;
            } else if (targetScroll < maxScrollLeft) {
              overscrollX = targetScroll - maxScrollLeft;
              column.scrollLeft = maxScrollLeft;
            } else {
              column.scrollLeft = targetScroll;
            }

            // 左右越界阻尼拉伸
            const dampX = (val) => {
              const sign = Math.sign(val);
              const abs = Math.abs(val);
              const limit = 150;
              if (abs > limit) {
                return sign * (limit + (abs - limit) * 0.15);
              }
              return val * 0.45; // 彈性系數
            };

            const dragX = -dampX(overscrollX);

            // 2. 依然可以有縱向彈性拉伸
            const maxDragY = 150;
            const dampY = (val) => {
              const sign = Math.sign(val);
              const abs = Math.abs(val);
              if (abs > maxDragY) {
                return sign * (maxDragY + (abs - maxDragY) * 0.2);
              }
              return val;
            };

            column.style.transform = `translate3d(${dragX}px, ${dampY(dy)}px, 0)`;

          } else {
            // 大屏幕情況下：整體自由拖拽回彈
            const maxDrag = 400;
            const damp = (val) => {
              const sign = Math.sign(val);
              const abs = Math.abs(val);
              if (abs > maxDrag) {
                return sign * (maxDrag + (abs - maxDrag) * 0.25);
              }
              return val;
            };

            const dragX = damp(dx);
            const dragY = damp(dy);
            column.style.transform = `translate3d(${dragX}px, ${dragY}px, 0)`;
          }

          // 計算拖拽速度（大小屏幕通用）
          const now = Date.now();
          const dt = now - lastTime;
          if (dt > 0) {
            velX = ((pageX - lastX) / dt) * 16;
          }
          lastX = pageX;
          lastTime = now;
        }

        function onEnd() {
          if (!isDown) return;
          isDown = false;

          // 彈性恢復位移至 (0, 0)
          column.style.transition = 'transform 0.6s cubic-bezier(0.25, 1.6, 0.45, 1)';
          column.style.transform = 'translate3d(0, 0, 0)';

          const isOverflow = column.scrollWidth - column.clientWidth > 15;
          if (isOverflow && moved) {
            // 小屏幕下啟動慣性滾動
            startMomentum();
          }

          // ---- 卡片逐張 Q 彈回弹 ----
          if (moved) {
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const cards = column.querySelectorAll('.card');

            if (prefersReducedMotion) {
              cards.forEach(card => {
                card.style.transition = 'none';
                card.style.transform = 'translate3d(0, 0, 0)';
                card.style.opacity = '1';
                setTimeout(() => {
                  card.style.transition = '';
                  card.style.transform = '';
                  card.style.animation = '';
                }, 0);
              });
            } else {
              const dx = lastX - startX; // 整體拖拽位移
              // 優先用速度，速度太小則用位移方向
              let impulse = velX;
              if (Math.abs(impulse) < 2) {
                impulse = dx * 0.3;
              }
              const clamped = Math.max(-40, Math.min(40, impulse));

              cards.forEach((card, i) => {
                // 先清除之前的任何 pending 彈出定時器和監聽器
                if (card._bounceTimeout1) clearTimeout(card._bounceTimeout1);
                if (card._bounceTimeout2) clearTimeout(card._bounceTimeout2);
                if (card._bounceCleanup) {
                  card.removeEventListener('transitionend', card._bounceCleanup);
                }

                // 先解除 cardEnter 動畫的 forwards 鎖定，否則 inline transform 無效
                card.style.animation = 'none';
                // 每張卡片根據序號獲得遞增的偏移和延遲，形成連鎖波浪
                const offset = clamped * (1.2 + i * 0.55);
                const delay = i * 55; // ms 逐張遞增延遲

                card.style.transition = 'none';
                card.style.transform = `translate3d(${offset}px, 0, 0)`;
                card.style.opacity = '1';

                card._bounceTimeout1 = setTimeout(() => {
                  card.style.transition = `transform ${0.55 + i * 0.07}s cubic-bezier(0.22, 1.9, 0.36, 1)`;
                  card.style.transform = 'translate3d(0, 0, 0)';
                }, delay);

                // 動畫結束後清理 inline style，避免影響 hover 等其他 transition
                const cleanup = () => {
                  card.style.transition = '';
                  card.style.transform = '';
                  card.style.animation = '';
                  card.removeEventListener('transitionend', cleanup);
                  card._bounceCleanup = null;
                };
                card._bounceCleanup = cleanup;
                card.addEventListener('transitionend', cleanup);

                // 作為備用，如果 transition 沒觸發（例如 offset 為 0），在延遲後也進行清理
                card._bounceTimeout2 = setTimeout(cleanup, delay + (0.55 + i * 0.07) * 1000 + 100);
              });
            }
          }
        }

        // ---- 滑鼠事件 ----
        column.addEventListener('mousedown', (e) => {
          // 不再調用 e.preventDefault()，以免影響卡片連結的正常點選。卡片自身的拖拽預防已在 dragstart 中處理
          onStart(e.clientX, e.clientY);
        });

        document.addEventListener('mousemove', (e) => {
          onMove(e.clientX, e.clientY);
        });

        document.addEventListener('mouseup', () => {
          onEnd();
        });

        // ---- 觸屏事件 ----
        column.addEventListener('touchstart', (e) => {
          onStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
          if (isDown) {
            onMove(e.touches[0].clientX, e.touches[0].clientY);
            if (e.cancelable) e.preventDefault();
          }
        }, { passive: false });

        window.addEventListener('touchend', () => {
          onEnd();
        });

        window.addEventListener('touchcancel', () => {
          onEnd();
        });

        // 防止拖拽鏈接文字/圖片等觸發瀏覽器的默認拖放行為
        column.querySelectorAll('.card').forEach(card => {
          card.addEventListener('dragstart', (e) => {
            e.preventDefault();
          });

          card.addEventListener('click', (e) => {
            if (moved) {
              e.preventDefault();
              e.stopPropagation();
            }
          });
        });

        // ---- 滾動提示自動消失 ----
        const hint = document.getElementById('scrollHint');
        if (hint) {
          let hintTimer = setTimeout(() => hint.classList.add('fading'), 5000);

          const dismissHint = () => {
            hint.classList.add('fading');
            clearTimeout(hintTimer);
          };

          column.addEventListener('scroll', dismissHint, { once: true });
          column.addEventListener('wheel', dismissHint, { once: true });
          column.addEventListener('mousedown', dismissHint, { once: true });
          column.addEventListener('touchstart', dismissHint, { once: true });
        }
      })();


      // ===== 背景视差 + 墨韵光标 =====
      (function () {
        const dayImg = document.getElementById('sceneDay');
        const nightImg = document.getElementById('sceneNight');
        const inkDot = document.getElementById('inkCursor');
        if (!dayImg || !nightImg) return;
        let raf = null;
        let entered = false;

        // 僅在支援 hover 的設備（如帶有滑鼠的桌面瀏覽器）上啟用視差與墨韻光標
        if (window.matchMedia('(hover: hover)').matches) {
          window.addEventListener('mousemove', (e) => {
            if (!entered) {
              entered = true;
              if (inkDot) inkDot.classList.add('visible');
            }
            if (raf) return;
            raf = requestAnimationFrame(() => {
              const dx = (e.clientX / window.innerWidth - 0.5) * -14;
              const dy = (e.clientY / window.innerHeight - 0.5) * -8;
              const t = `translate(${dx}px, ${dy}px)`;
              dayImg.style.transform = t;
              nightImg.style.transform = t;
              if (inkDot) {
                inkDot.style.left = e.clientX + 'px';
                inkDot.style.top = e.clientY + 'px';
              }
              raf = null;
            });
          });
        }
      })();
  </script>
