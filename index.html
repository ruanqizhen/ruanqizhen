<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>阮奇桢 | 個人主頁</title>
  <meta name="description" content="阮奇桢的个人主页：墨卷、雅集、拾遗——于山水之间，写代码、读文章、记浮生。">
  <meta name="keywords" content="阮奇桢, LabVIEW, Python, 编程教程, 个人博客, 技术教程, 文学创作">
  <meta property="og:title" content="阮奇桢 | 个人主页">
  <meta property="og:description" content="技术教程、文学创作与生活随笔">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://qizhen.xyz">
  <meta property="og:image" content="https://qizhen.xyz/og-image.png">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='2' fill='%23a03020'/><rect x='6' y='6' width='88' height='88' rx='1' fill='none' stroke='rgba(240,200,180,0.28)' stroke-width='3'/><text x='50' y='68' font-size='58' font-weight='900' fill='rgba(248,235,225,0.92)' text-anchor='middle' font-family='serif'>楨</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;700&family=Zhi+Mang+Xing&family=Long+Cang&family=Ma+Shan+Zheng&display=swap"
    rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --paper: #f4f1e8;
      --paper-edge: #d8d0c2;
      --seal-red: #a03020;
      --seal-text-color: rgba(248, 235, 225, 0.92);
      --transition-dur: 2.2s;
      /* 文字層 */
      --text-primary: #2a2418;
      --text-secondary: #5a5040;
      --text-link: #3a352a;
      --text-link-hover: #6a4030;
      --text-shadow: 0 1px 3px rgba(245, 240, 232, 0.5);
      --card-bg: rgba(245, 240, 232, 0.55);
      --card-border: rgba(160, 140, 110, 0.30);
      --card-hover-bg: rgba(245, 240, 232, 0.78);
      --card-hover-border: rgba(140, 100, 60, 0.50);
      --scroll-track: rgba(160, 140, 110, 0.15);
      --scroll-thumb: rgba(140, 120, 90, 0.35);
    }

    .night-mode {
      --paper: #2b2018;
      --paper-edge: #a08868;
      --seal-red: #8a2818;
      --seal-text-color: rgba(240, 220, 200, 0.85);
      --text-primary: #f2e8d4;
      --text-secondary: #d8c8a8;
      --text-link: #e8dcc0;
      --text-link-hover: #f0c878;
      --text-shadow: 0 1px 4px rgba(15, 8, 0, 0.55);
      --card-bg: rgba(35, 22, 12, 0.45);
      --card-border: rgba(150, 115, 70, 0.45);
      --card-hover-bg: rgba(45, 30, 18, 0.60);
      --card-hover-border: rgba(200, 150, 80, 0.55);
      --scroll-track: rgba(80, 55, 30, 0.25);
      --scroll-thumb: rgba(140, 110, 70, 0.45);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--paper);
      transition: background var(--transition-dur) ease;
      font-family: 'LXGW WenKai TC', 'Kaiti SC', 'STKaiti', 'KaiTi', '楷体', 'STSong', 'SimSun', 'Songti SC', 'Noto Serif CJK SC', serif;
    }

    /* ==========================================================
       背景层 —— AI 水墨长卷 双图交叉淡入
       ========================================================== */
    .scene {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .scene-img {
      position: absolute;
      inset: -2.5%;
      width: 105%;
      height: 105%;
      background-size: cover;
      background-position: center 38%;
      transition: opacity var(--transition-dur) ease, transform 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
      will-change: transform, opacity;
    }

    .scene-day {
      background-image: url('assets/bg-day.jpg');
      opacity: 1;
    }

    .scene-night {
      background-image: url('assets/bg-night.jpg');
      opacity: 0;
    }

    .night-mode .scene-day {
      opacity: 0;
    }

    .night-mode .scene-night {
      opacity: 1;
    }

    /* 宣纸纤维纹理 + 四周暗角（裱边感） */
    .scene::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      background:
        repeating-linear-gradient(90deg, transparent 0, transparent 3px, rgba(120, 110, 90, 0.018) 3px, rgba(120, 110, 90, 0.018) 4px),
        repeating-linear-gradient(0deg, transparent 0, transparent 5px, rgba(110, 100, 80, 0.015) 5px, rgba(110, 100, 80, 0.015) 6px);
      box-shadow:
        inset 0 0 110px rgba(60, 55, 40, 0.22),
        inset 0 0 320px rgba(60, 55, 40, 0.10);
    }

    /* ==========================================================
       漂移雾霭 —— 两条横向雾带增添动感
       ========================================================== */
    @keyframes mistDrift1 {

      0%,
      100% {
        transform: translateX(-2%);
        opacity: 0.55;
      }

      50% {
        transform: translateX(3%);
        opacity: 0.75;
      }
    }

    @keyframes mistDrift2 {

      0%,
      100% {
        transform: translateX(2%);
        opacity: 0.40;
      }

      50% {
        transform: translateX(-3%);
        opacity: 0.60;
      }
    }

    .mist {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(34px);
      z-index: 3;
    }

    .mist-1 {
      left: -5%;
      bottom: 30%;
      width: 75%;
      height: 9%;
      background: radial-gradient(ellipse 80% 60% at 45% 50%, rgba(250, 248, 242, 0.85) 0%, transparent 100%);
      animation: mistDrift1 26s ease-in-out infinite;
    }

    .mist-2 {
      right: -8%;
      bottom: 38%;
      width: 60%;
      height: 7%;
      background: radial-gradient(ellipse 75% 55% at 55% 50%, rgba(250, 248, 242, 0.70) 0%, transparent 100%);
      animation: mistDrift2 32s ease-in-out infinite;
    }

    .night-mode .mist-1,
    .night-mode .mist-2 {
      background: radial-gradient(ellipse 78% 58% at 50% 50%, rgba(120, 90, 55, 0.35) 0%, transparent 100%);
    }

    @keyframes cardEnter {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== 主畫布（內容層包装） ===== */
    .canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      z-index: 10;
      pointer-events: none;
    }

    @keyframes titleReveal {
      0% {
        opacity: 0;
        filter: blur(8px);
      }

      40% {
        opacity: 0;
        filter: blur(8px);
      }

      100% {
        opacity: 0.4;
        filter: blur(0);
      }
    }

    .title-container {
      position: fixed;
      top: 8vh;
      left: 40px;
      z-index: 2;
      opacity: 0.4;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: titleReveal 4s ease-out;
    }

    .main-title {
      font-family: 'Zhi Mang Xing', 'Long Cang', 'Ma Shan Zheng', cursive;
      font-size: 6vh;
      font-weight: 700;
      letter-spacing: 1vh;
      color: var(--text-primary);
      transition: color var(--transition-dur) ease;
      text-shadow: var(--text-shadow);
      writing-mode: vertical-rl;
    }

    /* 印章 */
    .seal-img {
      margin-top: 2vh;
      width: 6vh;
      height: auto;
      filter: drop-shadow(1px 2px 4px rgba(80, 20, 15, 0.25));
      opacity: 0.95;
    }

    /* 卡片列 */
    .card-column {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 20px 8px;
      flex-shrink: 0;
      gap: 12px;
      pointer-events: auto;
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100vw;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
      user-select: none;
    }

    .card-column:active {
      cursor: grabbing;
    }

    .card-column::-webkit-scrollbar {
      height: 4px;
    }

    .card-column::-webkit-scrollbar-track {
      background: var(--scroll-track);
      border-radius: 2px;
    }

    .card-column::-webkit-scrollbar-thumb {
      background: var(--scroll-thumb);
      border-radius: 2px;
    }

    .card {
      text-decoration: none;
      color: var(--text-primary);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 14px 12px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: all 0.4s ease;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      min-height: 0;
      flex-shrink: 0;
      opacity: 0;
      transform: translateY(12px);
      animation: cardEnter 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    .card:nth-child(1) {
      animation-delay: 0.18s;
    }

    .card:nth-child(2) {
      animation-delay: 0.30s;
    }

    .card:nth-child(3) {
      animation-delay: 0.42s;
    }

    .card:nth-child(4) {
      animation-delay: 0.54s;
    }

    .card:nth-child(5) {
      animation-delay: 0.66s;
    }

    .card:nth-child(6) {
      animation-delay: 0.78s;
    }

    .card:nth-child(7) {
      animation-delay: 0.90s;
    }

    .card:hover {
      background: var(--card-hover-bg);
      border-color: var(--card-hover-border);
      box-shadow:
        0 6px 24px rgba(80, 60, 30, 0.14),
        0 0 40px rgba(180, 140, 80, 0.10),
        0 0 80px rgba(200, 160, 100, 0.06);
      transform: translateY(-4px) translateX(-1px);
    }

    .card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 7px;
      background: radial-gradient(ellipse 60% 40% at 50% 80%, rgba(200, 150, 80, 0.12) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: -1;
    }

    .card:hover::after {
      opacity: 1;
    }

    .card:visited {
      border-left: 3px solid rgba(160, 120, 60, 0.25);
    }

    .night-mode .card:visited {
      border-left: 3px solid rgba(200, 150, 80, 0.30);
    }

    .card-header {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--text-primary);
      transition: color var(--transition-dur) ease;
      line-height: 1.4;
    }

    .card:hover .card-title {
      color: var(--text-link-hover);
    }

    .card-tag {
      font-size: 12px;
      padding: 2px 5px;
      border-radius: 3px;
      font-weight: 500;
      letter-spacing: 2px;
      display: inline-block;
      line-height: 1.4;
    }

    .card-tag.book {
      background: rgba(160, 120, 60, 0.12);
      color: var(--text-link-hover);
    }

    .card-tag.web {
      background: rgba(100, 120, 140, 0.12);
      color: var(--text-secondary);
    }

    .card-tag.game {
      background: rgba(180, 140, 60, 0.12);
      color: #8a6830;
    }

    .card-tag.blog {
      background: rgba(110, 140, 120, 0.12);
      color: #588068;
    }

    .night-mode .card-tag.game {
      background: rgba(200, 160, 80, 0.18);
      color: #d4b878;
    }

    .night-mode .card-tag.blog {
      background: rgba(140, 170, 150, 0.18);
      color: #a0c8a8;
    }

    .card-desc {
      font-family: 'LiSu', '隶书', 'STLiti', '华文隶书', serif;
      font-size: 16px;
      color: var(--text-secondary);
      letter-spacing: 2px;
      line-height: 1.8;
      opacity: 0.75;
      transition: color var(--transition-dur) ease;
    }

    /* ===== 晝夜切換按鈕 ===== */
    .toggle-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1.5px solid rgba(120, 100, 70, 0.25);
      background: rgba(245, 240, 232, 0.60);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      color: var(--text-primary);
      transition: all 0.4s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      pointer-events: auto;
    }

    .toggle-btn:hover {
      background: rgba(245, 240, 232, 0.88);
      transform: scale(1.08);
    }

    .night-mode .toggle-btn:hover {
      background: rgba(60, 38, 20, 0.70);
    }

    .toggle-btn .icon-sun,
    .toggle-btn .icon-moon {
      transition: opacity 0.4s ease;
      position: absolute;
    }

    .toggle-btn .icon-moon {
      opacity: 0;
    }

    .night-mode .toggle-btn .icon-sun {
      opacity: 0;
    }

    .night-mode .toggle-btn .icon-moon {
      opacity: 1;
    }

    @keyframes toggleSpin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .toggle-btn.spinning {
      animation: toggleSpin 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .night-mode .toggle-btn {
      border-color: rgba(200, 160, 100, 0.30);
      background: rgba(80, 60, 35, 0.50);
    }

    /* 夜間文字可讀性提升 */
    .night-mode .card-desc {
      opacity: 0.88;
    }

    .night-mode .card:hover {
      box-shadow:
        0 6px 24px rgba(20, 10, 0, 0.20),
        0 0 40px rgba(200, 150, 80, 0.12),
        0 0 80px rgba(220, 170, 100, 0.08);
    }

    .night-mode .card-tag.book {
      background: rgba(200, 150, 80, 0.18);
    }

    .night-mode .card-tag.web {
      background: rgba(160, 175, 195, 0.18);
    }

    .title-bg {
      position: absolute;
      top: 46%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      z-index: 10;
      pointer-events: none;
      writing-mode: vertical-rl;
      max-width: 100vw;
    }

    /* ===== 橫向滾動提示 ===== */
    .scroll-hint {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 180;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.7;
      transition: opacity 1.5s ease;
      animation: hintPulse 2.5s ease-in-out infinite;
      writing-mode: horizontal-tb;
    }

    .scroll-hint.fading {
      opacity: 0;
    }

    @keyframes hintPulse {

      0%,
      100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(12px);
      }
    }

    .scroll-hint-arrow {
      font-size: 18px;
      color: var(--text-secondary);
      line-height: 1;
    }

    .scroll-hint-text {
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 2px;
    }

    /* ===== 響應式 ===== */
    @media (max-width: 900px) {
      .title-container {
        top: 8vh;
        left: 20px;
      }

      .card-title {
        font-size: 18px;
        letter-spacing: 3px;
      }

      .card-desc {
        font-size: 15px;
      }

      .card-tag {
        font-size: 11px;
        padding: 2px 4px;
      }

      .scroll-hint {
        bottom: 20px;
        right: 16px;
      }

      .scroll-hint-text {
        font-size: 12px;
      }

      .title-bg {
        top: 46%;
        left: 50%;
        transform: translate(-50%, -50%);
        right: auto;
      }
    }

    @media (max-width: 500px) {
      .title-container {
        top: 8vh;
        left: 10px;
      }

      .card {
        padding: 12px 10px;
        gap: 4px;
      }

      .card-title {
        font-size: 17px;
        letter-spacing: 2px;
      }

      .card-desc {
        font-size: 14px;
        letter-spacing: 1px;
      }

      .card-tag {
        font-size: 10px;
        padding: 2px 3px;
        letter-spacing: 1px;
      }

      .card-column {
        padding: 12px 4px;
        gap: 8px;
      }

      .scroll-hint {
        bottom: 16px;
        right: 10px;
      }

      .scroll-hint-arrow {
        font-size: 14px;
      }

      .scroll-hint-text {
        font-size: 11px;
        letter-spacing: 1px;
      }

      .title-bg {
        top: 46%;
        left: 50%;
        transform: translate(-50%, -50%);
        right: auto;
      }
    }

    /* 减少动态偏好 */
    @media (prefers-reduced-motion: reduce) {

      .mist-1,
      .mist-2,
      .scroll-hint {
        animation: none;
      }

      .card {
        animation-duration: 0.01s;
      }
    }
  </style>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
        document.documentElement.dataset.nightMode = 'true';
      }
    })();
  </script>
  <script type="text/javascript">
    (function (c, l, a, r, i, t, y) {
      c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
      t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
      y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
    })(window, document, "clarity", "script", "jxmn1qjx88");
  </script>
</head>

<body>

  <div class="canvas" id="canvas">
    <!-- 背景层：来自于 index1.html -->
    <div class="scene" id="scene">
      <div class="scene-img scene-day" id="sceneDay"></div>
      <div class="scene-img scene-night" id="sceneNight"></div>
      <div class="mist mist-1"></div>
      <div class="mist mist-2"></div>
    </div>

    <div class="title-container">
      <h1 class="main-title">花开花落 云卷云舒</h1>
      <!-- 印章 - 圖片效果 -->
      <img class="seal-img" src="assets/seal_web.png" alt="之奇印楨">
    </div>

    <div class="title-bg">
      <div class="card-column">
        <a href="https://cocode.qizhen.xyz/" class="card" target="_blank" rel="noopener" id="card-cocode">
          <div class="card-header">
            <div class="card-title">重構程序員</div>
            <span class="card-tag book">墨卷</span>
          </div>
          <div class="card-desc">寫給 AI 時代的自己·浪潮之下，一個程序員的困思與頓悟</div>
        </a>
        <a href="https://lv.qizhen.xyz" class="card" target="_blank" rel="noopener" id="card-labview">
          <div class="card-header">
            <div class="card-title">LabVIEW 編程</div>
            <span class="card-tag book">墨卷</span>
          </div>
          <div class="card-desc">探索數據流的藝術·從零開始的圖形化編程之道</div>
        </a>
        <a href="https://py.qizhen.xyz" class="card" target="_blank" rel="noopener" id="card-python">
          <div class="card-header">
            <div class="card-title">Python 教程</div>
            <span class="card-tag book">墨卷</span>
          </div>
          <div class="card-desc">賽博修仙指南·以代碼為劍，以邏輯為道</div>
        </a>
        <a href="https://anachron.qizhen.xyz" class="card" target="_blank" rel="noopener" id="card-anachron">
          <div class="card-header">
            <div class="card-title">回音堂</div>
            <span class="card-tag web">雅集</span>
          </div>
          <div class="card-desc">跨越時空的對話·以問答重現被歲月湮沒的往事</div>
        </a>
        <a href="https://glimmer.qizhen.xyz" class="card" target="_blank" rel="noopener" id="card-glimmer">
          <div class="card-header">
            <div class="card-title">塵世微光</div>
            <span class="card-tag web">拾遺</span>
          </div>
          <div class="card-desc">打撈時間的碎片·為上世紀的平凡人生留下註腳</div>
        </a>
        <a href="games.html" class="card" id="card-games">
          <div class="card-header">
            <div class="card-title">懷舊遊戲</div>
            <span class="card-tag game">閑趣</span>
          </div>
          <div class="card-desc">舊夢重溫·編程途中，信手拾回的少年歡愉</div>
        </a>
        <a href="https://blog.qizhen.xyz" class="card" target="_blank" rel="noopener" id="card-blog">
          <div class="card-header">
            <div class="card-title">個人博客</div>
            <span class="card-tag blog">隨筆</span>
          </div>
          <div class="card-desc">浮生雜記·關於技術、閱讀與日常的零墨碎痕</div>
        </a>
      </div>
    </div>

    <!-- 晝夜切換 -->
    <div class="scroll-hint" id="scrollHint">
      <span class="scroll-hint-arrow">◁</span>
      <span class="scroll-hint-text">滑動瀏覽</span>
    </div>

    <button class="toggle-btn" id="toggleBtn" aria-label="切換晝夜模式">
      <span class="icon-sun">☀</span>
      <span class="icon-moon">☾</span>
    </button>

    <script>
      // 晝夜切換
      (function () {
        const canvas = document.getElementById('canvas');
        const btn = document.getElementById('toggleBtn');

        // 應用初始狀態
        if (document.documentElement.dataset.nightMode === 'true') {
          canvas.classList.add('night-mode');
        }

        btn.addEventListener('click', function () {
          const isNight = canvas.classList.toggle('night-mode');
          localStorage.setItem('theme', isNight ? 'dark' : 'light');
          // 旋轉動畫
          btn.classList.add('spinning');
          btn.addEventListener('animationend', function () {
            btn.classList.remove('spinning');
          }, { once: true });
        });
      })();

      // 拖拽卡片左右移動（支援滑鼠、觸屏、慣性滾動）
      (function () {
        const slider = document.querySelector('.card-column');
        if (!slider) return;

        let isDown = false;
        let startX;
        let scrollLeft;
        let moved = false;

        // ---- 慣性滾動 ----
        let velX = 0;
        let lastX = 0;
        let lastTime = 0;
        let momentumId = null;

        function stopMomentum() {
          if (momentumId) {
            cancelAnimationFrame(momentumId);
            momentumId = null;
          }
        }

        function startMomentum() {
          if (Math.abs(velX) < 0.5) return;

          const friction = 0.94;
          const minVel = 0.3;

          function step() {
            velX *= friction;
            slider.scrollLeft -= velX;

            if (Math.abs(velX) > minVel) {
              momentumId = requestAnimationFrame(step);
            } else {
              momentumId = null;
            }
          }

          momentumId = requestAnimationFrame(step);
        }

        // ---- 統一拖拽邏輯 ----
        function onStart(pageX) {
          stopMomentum();
          isDown = true;
          moved = false;
          startX = pageX - slider.offsetLeft;
          scrollLeft = slider.scrollLeft;
          velX = 0;
          lastX = pageX;
          lastTime = Date.now();
        }

        function onMove(pageX) {
          if (!isDown) return;
          const x = pageX - slider.offsetLeft;
          const walk = (x - startX) * 1.5;
          if (Math.abs(walk) > 5) {
            moved = true;
          }
          slider.scrollLeft = scrollLeft - walk;

          // 計算瞬時速度
          const now = Date.now();
          const dt = now - lastTime;
          if (dt > 0) {
            velX = ((pageX - lastX) / dt) * 16; // 歸一化至 ~60fps
          }
          lastX = pageX;
          lastTime = now;
        }

        function onEnd() {
          if (!isDown) return;
          isDown = false;
          if (moved) {
            startMomentum();
          }
        }

        // ---- 滑鼠事件 ----
        slider.addEventListener('mousedown', (e) => {
          e.preventDefault();
          onStart(e.pageX);
        });

        document.addEventListener('mousemove', (e) => {
          onMove(e.pageX);
        });

        document.addEventListener('mouseup', () => {
          onEnd();
        });

        // ---- 觸屏事件 ----
        slider.addEventListener('touchstart', (e) => {
          onStart(e.touches[0].pageX);
        }, { passive: true });

        slider.addEventListener('touchmove', (e) => {
          onMove(e.touches[0].pageX);
        }, { passive: true });

        document.addEventListener('touchend', () => {
          onEnd();
        });

        // 防止拖拽卡片鏈接時觸發 HTML5 默認拖放行為
        slider.querySelectorAll('.card').forEach(card => {
          card.addEventListener('dragstart', (e) => {
            e.preventDefault();
          });

          // 如果發生了滑動拖拽，阻止卡片點擊跳轉事件
          card.addEventListener('click', (e) => {
            if (moved) {
              e.preventDefault();
              e.stopPropagation();
            }
          });
        });

        // ---- 滾動提示自動消失 ----
        const hint = document.getElementById('scrollHint');
        if (hint) {
          let hintTimer = setTimeout(() => hint.classList.add('fading'), 5000);

          slider.addEventListener('scroll', () => {
            hint.classList.add('fading');
            clearTimeout(hintTimer);
          }, { once: true });

          slider.addEventListener('mousedown', () => {
            hint.classList.add('fading');
            clearTimeout(hintTimer);
          }, { once: true });

          slider.addEventListener('touchstart', () => {
            hint.classList.add('fading');
            clearTimeout(hintTimer);
          }, { once: true });
        }
      })();

      // ===== 背景视差（鼠标轻移，山水微动）=====
      (function () {
        const dayImg = document.getElementById('sceneDay');
        const nightImg = document.getElementById('sceneNight');
        if (!dayImg || !nightImg) return;
        let raf = null;
        window.addEventListener('mousemove', (e) => {
          if (raf) return;
          raf = requestAnimationFrame(() => {
            const dx = (e.clientX / window.innerWidth - 0.5) * -14;
            const dy = (e.clientY / window.innerHeight - 0.5) * -8;
            const t = `translate(${dx}px, ${dy}px)`;
            dayImg.style.transform = t;
            nightImg.style.transform = t;
            raf = null;
          });
        });
      })();
    </script>
    <script async src="https://hm.baidu.com/hm.js?b3f6e7ec9302021671173e3fad14f4cd"></script>
  </div><!-- /.canvas -->
</body>

</html>
