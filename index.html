<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>阮奇桢 | 個人主頁</title>
  <meta name="description" content="阮奇桢的个人主页：墨卷、雅集、拾遗——于山水之间，写代码、读文章、记浮生。">
  <meta name="keywords" content="阮奇桢, LabVIEW, Python, 编程教程, 个人博客, 技术教程, 文学创作">
  <meta property="og:title" content="阮奇桢 | 个人主页">
  <meta property="og:description" content="技术教程、文学创作与生活随笔">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://qizhen.xyz">
  <meta property="og:image" content="https://qizhen.xyz/og-image.png">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='2' fill='%23a03020'/><rect x='6' y='6' width='88' height='88' rx='1' fill='none' stroke='rgba(240,200,180,0.28)' stroke-width='3'/><text x='50' y='68' font-size='58' font-weight='900' fill='rgba(248,235,225,0.92)' text-anchor='middle' font-family='serif'>桢</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@300;400;700&family=Zhi+Mang+Xing&display=swap"
    rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* === 晨霧（默認） === */
      --sky-top: #e8e4dc;
      --sky-mid: #ebe7df;
      --sky-bot: #f0ece4;
      --paper: #f2ede4;
      --paper-edge: #d8d0c2;
      --ink-far: #8a8278;
      --ink-mid: #6a6258;
      --ink-near: #4a4438;
      --ink-deep: #3a352a;
      --water-top: rgba(120, 115, 105, 0.22);
      --water-bot: rgba(180, 174, 164, 0.06);
      --cloud-white: rgba(245, 242, 236, 0.92);
      --mist-white: rgba(248, 245, 240, 0.80);
      --bird-color: #3a352a;
      --seal-red: #a03020;
      --seal-text-color: rgba(248, 235, 225, 0.92);
      --inscription-color: #3a3228;
      --reflection-opacity: 0.12;
      --sky-glow: transparent;
      --water-glow: transparent;
      --transition-dur: 1.8s;
      /* 文字層 */
      --text-primary: #2a2418;
      --text-secondary: #5a5040;
      --text-link: #3a352a;
      --text-link-hover: #6a4030;
      --text-shadow: 0 1px 3px rgba(245, 240, 232, 0.5);
      --card-bg: rgba(245, 240, 232, 0.55);
      --card-border: rgba(160, 140, 110, 0.30);
      --card-hover-bg: rgba(245, 240, 232, 0.78);
      --card-hover-border: rgba(140, 100, 60, 0.50);
      --scroll-track: rgba(160, 140, 110, 0.15);
      --scroll-thumb: rgba(140, 120, 90, 0.35);
    }

    .night-mode {
      --sky-top: #4a3828;
      --sky-mid: #6a4830;
      --sky-bot: #8a6040;
      --paper: #c8b898;
      --paper-edge: #a08868;
      --ink-far: #5a4a38;
      --ink-mid: #4a3a28;
      --ink-near: #3a2e20;
      --ink-deep: #2a2218;
      --water-top: rgba(80, 60, 35, 0.30);
      --water-bot: rgba(140, 110, 70, 0.08);
      --cloud-white: rgba(200, 170, 130, 0.55);
      --mist-white: rgba(210, 180, 140, 0.50);
      --bird-color: #c8b8a0;
      --seal-red: #8a2818;
      --seal-text-color: rgba(240, 220, 200, 0.85);
      --inscription-color: #2a2218;
      --reflection-opacity: 0.18;
      --sky-glow: rgba(200, 120, 40, 0.12);
      --water-glow: rgba(220, 160, 60, 0.08);
      --text-primary: #f2e8d4;
      --text-secondary: #d8c8a8;
      --text-link: #e8dcc0;
      --text-link-hover: #f0c878;
      --text-shadow: 0 1px 4px rgba(15, 8, 0, 0.55);
      --card-bg: rgba(35, 22, 12, 0.45);
      --card-border: rgba(150, 115, 70, 0.45);
      --card-hover-bg: rgba(45, 30, 18, 0.60);
      --card-hover-border: rgba(200, 150, 80, 0.55);
      --scroll-track: rgba(80, 55, 30, 0.25);
      --scroll-thumb: rgba(140, 110, 70, 0.45);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--paper);
      transition: background var(--transition-dur) ease;
      font-family: 'LXGW WenKai TC', 'Kaiti SC', 'STKaiti', 'KaiTi', '楷体', 'STSong', 'SimSun', 'Songti SC', 'Noto Serif CJK SC', serif;
    }

    /* ===== 動畫 ===== */
    @keyframes drift1 {

      0%,
      100% {
        transform: translateX(0) translateY(0) scaleX(1);
      }

      50% {
        transform: translateX(30px) translateY(-6px) scaleX(1.08);
      }
    }

    @keyframes drift2 {

      0%,
      100% {
        transform: translateX(0) translateY(0);
      }

      50% {
        transform: translateX(-25px) translateY(4px) scaleX(0.94);
      }
    }

    @keyframes drift3 {

      0%,
      100% {
        transform: translateX(0) translateY(0);
      }

      50% {
        transform: translateX(15px) translateY(-8px);
      }
    }

    @keyframes flyBird1 {
      0% {
        transform: translate(0, 0);
        opacity: 0;
      }

      4% {
        opacity: 1;
      }

      96% {
        opacity: 1;
      }

      100% {
        transform: translate(550px, -50px);
        opacity: 0;
      }
    }

    @keyframes flyBird2 {
      0% {
        transform: translate(0, 0);
        opacity: 0;
      }

      4% {
        opacity: 1;
      }

      96% {
        opacity: 1;
      }

      100% {
        transform: translate(-480px, -35px);
        opacity: 0;
      }
    }

    @keyframes flyBird3 {
      0% {
        transform: translate(0, 0);
        opacity: 0;
      }

      5% {
        opacity: 1;
      }

      95% {
        opacity: 1;
      }

      100% {
        transform: translate(380px, -65px);
        opacity: 0;
      }
    }

    @keyframes flapWing {

      0%,
      100% {
        transform: scaleY(1) rotate(0deg);
      }

      25% {
        transform: scaleY(0.6) rotate(-5deg);
      }

      50% {
        transform: scaleY(1) rotate(0deg);
      }

      75% {
        transform: scaleY(0.7) rotate(3deg);
      }
    }

    @keyframes ripple {

      0%,
      100% {
        transform: scaleX(1);
        opacity: 0.18;
      }

      50% {
        transform: scaleX(1.03);
        opacity: 0.28;
      }
    }

    @keyframes ripple2 {

      0%,
      100% {
        transform: scaleX(1) translateY(0);
        opacity: 0.12;
      }

      50% {
        transform: scaleX(1.02) translateY(-2px);
        opacity: 0.22;
      }
    }

    @keyframes ripple3 {

      0%,
      100% {
        transform: scaleX(1);
        opacity: 0.08;
      }

      50% {
        transform: scaleX(1.025);
        opacity: 0.16;
      }
    }

    @keyframes waterfall {

      0%,
      100% {
        opacity: 0.35;
      }

      50% {
        opacity: 0.58;
      }
    }

    /* 孤舟漂動動畫 */
    .fishing-boat {
      transform-origin: 610px 548px;
      animation: driftBoat 140s ease-in-out infinite;
    }

    @keyframes driftBoat {

      0%,
      100% {
        transform: translate(610px, 548px) rotate(-1deg);
      }

      50% {
        transform: translate(860px, 550px) rotate(1.5deg);
      }
    }

    @keyframes cardEnter {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== 主畫布（背景層） ===== */
    .canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: linear-gradient(180deg,
          var(--sky-top) 0%,
          var(--sky-mid) 30%,
          var(--sky-bot) 55%,
          var(--paper) 70%);
      transition: background var(--transition-dur) ease;
      z-index: 0;
    }

    .canvas .sky-glow {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 60%;
      background: radial-gradient(ellipse 120% 80% at 70% 80%, var(--sky-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
      transition: background var(--transition-dur) ease;
    }

    /* 宣紙紋理 */
    .canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background:
        repeating-linear-gradient(90deg,
          transparent 0, transparent 2px,
          rgba(160, 140, 110, 0.035) 2px, rgba(160, 140, 110, 0.035) 3px),
        repeating-linear-gradient(0deg,
          transparent 0, transparent 4px,
          rgba(140, 120, 90, 0.028) 4px, rgba(140, 120, 90, 0.028) 5px),
        repeating-linear-gradient(35deg,
          transparent 0, transparent 8px,
          rgba(130, 110, 80, 0.015) 8px, rgba(130, 110, 80, 0.015) 9px),
        radial-gradient(ellipse 40% 30% at 25% 35%, rgba(160, 140, 100, 0.04) 0%, transparent 100%),
        radial-gradient(ellipse 35% 25% at 72% 60%, rgba(150, 130, 90, 0.035) 0%, transparent 100%),
        radial-gradient(ellipse 50% 40% at 50% 80%, rgba(140, 120, 85, 0.03) 0%, transparent 100%);
    }

    .canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 99;
      box-shadow:
        inset 0 0 120px rgba(120, 100, 70, 0.20),
        inset 0 0 300px rgba(100, 80, 55, 0.08),
        inset 80px 0 60px -40px rgba(110, 90, 60, 0.12),
        inset -80px 0 60px -40px rgba(110, 90, 60, 0.12);
    }

    .scene-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* ===== 雲霧 ===== */
    .cloud {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      transition: background var(--transition-dur) ease;
    }

    .cloud-sea-1 {
      bottom: 22%;
      left: -3%;
      width: 65%;
      height: 5%;
      background: radial-gradient(ellipse 85% 70% at 45% 55%, var(--cloud-white) 0%, transparent 100%);
      filter: blur(22px);
      animation: drift1 14s ease-in-out infinite;
    }

    .cloud-sea-2 {
      bottom: 23%;
      right: -13%;
      width: 58%;
      height: 4.5%;
      background: radial-gradient(ellipse 80% 65% at 55% 50%, var(--cloud-white) 0%, transparent 100%);
      filter: blur(20px);
      animation: drift2 16s ease-in-out infinite;
    }

    .cloud-sea-3 {
      bottom: 25%;
      left: 20%;
      width: 70%;
      height: 4%;
      background: radial-gradient(ellipse 75% 55% at 50% 50%, var(--mist-white) 0%, transparent 100%);
      filter: blur(25px);
      animation: drift3 11s ease-in-out infinite;
      animation-delay: 2s;
    }

    .cloud-mid-1 {
      bottom: 32%;
      left: 10%;
      width: 40%;
      height: 3.5%;
      background: radial-gradient(ellipse 80% 60% at 40% 55%, var(--cloud-white) 0%, transparent 100%);
      filter: blur(16px);
      opacity: 0.85;
      animation: drift1 18s ease-in-out infinite;
      animation-delay: 3s;
    }

    .cloud-mid-2 {
      bottom: 34%;
      right: -2%;
      width: 35%;
      height: 3%;
      background: radial-gradient(ellipse 75% 55% at 55% 50%, var(--cloud-white) 0%, transparent 100%);
      filter: blur(14px);
      opacity: 0.75;
      animation: drift2 20s ease-in-out infinite;
      animation-delay: 1s;
    }

    .cloud-mid-3 {
      bottom: 38%;
      left: 35%;
      width: 32%;
      height: 2.5%;
      background: radial-gradient(ellipse 70% 50% at 50% 50%, var(--mist-white) 0%, transparent 100%);
      filter: blur(12px);
      opacity: 0.70;
      animation: drift3 15s ease-in-out infinite;
      animation-delay: 5s;
    }

    .cloud-hi-1 {
      bottom: 44%;
      left: 5%;
      width: 28%;
      height: 2%;
      background: radial-gradient(ellipse, var(--mist-white) 0%, transparent 100%);
      filter: blur(10px);
      opacity: 0.55;
      animation: drift2 24s ease-in-out infinite;
      animation-delay: 4s;
    }

    .cloud-hi-2 {
      bottom: 48%;
      right: 3%;
      width: 24%;
      height: 1.8%;
      background: radial-gradient(ellipse, var(--mist-white) 0%, transparent 100%);
      filter: blur(8px);
      opacity: 0.45;
      animation: drift1 22s ease-in-out infinite;
      animation-delay: 6s;
    }

    .cloud-mountain-1 {
      bottom: 30%;
      left: 0%;
      width: 50%;
      height: 3%;
      background: radial-gradient(ellipse 90% 80% at 40% 50%, var(--cloud-white) 0%, transparent 100%);
      filter: blur(18px);
      opacity: 0.90;
      animation: drift1 12s ease-in-out infinite;
      animation-delay: 1s;
    }

    .cloud-mountain-2 {
      bottom: 28%;
      right: -8%;
      width: 45%;
      height: 2.5%;
      background: radial-gradient(ellipse 85% 70% at 60% 50%, var(--cloud-white) 0%, transparent 100%);
      filter: blur(16px);
      opacity: 0.80;
      animation: drift2 14s ease-in-out infinite;
      animation-delay: 3s;
    }

    /* ===== 飛鳥 ===== */
    .birds-group {
      position: absolute;
      pointer-events: none;
    }

    .birds-1 {
      top: 18%;
      left: 8%;
      animation: flyBird1 28s linear infinite;
    }

    .birds-2 {
      top: 22%;
      right: 0%;
      animation: flyBird2 34s linear infinite;
      animation-delay: 10s;
    }

    .birds-3 {
      top: 15%;
      left: 30%;
      animation: flyBird3 22s linear infinite;
      animation-delay: 5s;
    }

    .bird {
      position: absolute;
      width: 16px;
      height: 6px;
      animation: flapWing 0.8s ease-in-out infinite;
    }

    .bird::before,
    .bird::after {
      content: '';
      position: absolute;
      top: 0;
      width: 8px;
      height: 6px;
      border-top: 1.5px solid var(--bird-color);
      border-radius: 50% 50% 0 0;
      transition: border-color var(--transition-dur) ease;
    }

    .bird::before {
      left: 0;
      transform: rotate(-10deg);
    }

    .bird::after {
      right: 0;
      transform: rotate(10deg);
    }

    .bird-sm {
      width: 12px;
      height: 5px;
    }

    .bird-sm::before,
    .bird-sm::after {
      width: 6px;
      height: 5px;
      border-top-width: 1.2px;
    }

    .bird-xs {
      width: 9px;
      height: 4px;
    }

    .bird-xs::before,
    .bird-xs::after {
      width: 4.5px;
      height: 4px;
      border-top-width: 1px;
    }

    .wfall-anim {
      animation: waterfall 4s ease-in-out infinite;
    }

    .wfall-anim2 {
      animation: waterfall 4s ease-in-out infinite;
      animation-delay: 1.5s;
    }

    .ripple-anim {
      animation: ripple 7s ease-in-out infinite;
    }

    @keyframes mistFloat {

      0%,
      100% {
        transform: translateX(0);
        opacity: inherit;
      }

      50% {
        transform: translateX(15px);
      }
    }

    .mist-drift {
      animation: mistFloat 12s ease-in-out infinite;
    }

    .water-glow {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 15%;
      background: radial-gradient(ellipse 100% 60% at 60% 20%, var(--water-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 2;
      transition: background var(--transition-dur) ease;
    }

    /* ============================
     卷軸內容層 — 竪排右至左
     ============================ */
    .scroll-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      z-index: 50;
      pointer-events: none;
    }

    .scroll-content {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      display: flex;
      flex-direction: row-reverse;
      align-items: stretch;
      justify-content: center;
      padding: 40px 30px 30px 30px;
      gap: 0;
      overflow-x: auto;
      overflow-y: hidden;
      pointer-events: auto;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      direction: ltr;
      width: 100%;
      /* 自定義卷軸滾動條 */
      scrollbar-width: thin;
      scrollbar-color: var(--scroll-thumb) var(--scroll-track);
    }

    .scroll-content::-webkit-scrollbar {
      height: 6px;
    }

    .scroll-content::-webkit-scrollbar-track {
      background: var(--scroll-track);
      border-radius: 3px;
    }

    .scroll-content::-webkit-scrollbar-thumb {
      background: var(--scroll-thumb);
      border-radius: 3px;
    }

    /* 標題區 */
    .title-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 12px;
      flex-shrink: 0;
    }

    @keyframes titleReveal {
      0% {
        opacity: 0;
        filter: blur(8px);
      }

      40% {
        opacity: 0;
        filter: blur(8px);
      }

      100% {
        opacity: 0.12;
        filter: blur(0);
      }
    }

    .title-container {
      position: fixed;
      top: 60px;
      left: 40px;
      z-index: 2;
      opacity: 0.12;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: titleReveal 4s ease-out;
    }

    .main-title {
      font-family: 'Zhi Mang Xing', 'Long Cang', 'Ma Shan Zheng', cursive;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 12px;
      color: var(--text-primary);
      transition: color var(--transition-dur) ease;
      text-shadow: var(--text-shadow);
      writing-mode: vertical-rl;
    }

    /* 印章 */
    .seal {
      margin-top: 20px;
      width: 48px;
      height: 48px;
      background: var(--seal-red);
      border-radius: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background-image:
        radial-gradient(circle 1.5px at 10px 7px, rgba(248, 240, 230, 0.45) 0%, transparent 100%),
        radial-gradient(circle 1px at 32px 13px, rgba(248, 240, 230, 0.35) 0%, transparent 100%),
        radial-gradient(circle 1.5px at 7px 35px, rgba(248, 240, 230, 0.40) 0%, transparent 100%),
        radial-gradient(circle 1px at 38px 38px, rgba(248, 240, 230, 0.30) 0%, transparent 100%),
        radial-gradient(circle 1px at 22px 24px, rgba(248, 240, 230, 0.25) 0%, transparent 100%);
      box-shadow: 1px 1px 5px rgba(80, 20, 15, 0.22);
      transition: background var(--transition-dur) ease;
      position: relative;
    }

    .seal::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 1.5px solid rgba(240, 200, 180, 0.28);
      border-radius: 0;
    }

    .seal-text {
      display: grid;
      grid-template-columns: repeat(2, 14px);
      grid-template-rows: repeat(2, 14px);
      width: 28px;
      height: 28px;
      z-index: 1;
    }

    .seal-char {
      color: var(--seal-text-color);
      font-family: 'LXGW WenKai TC', 'Kaiti SC', 'STKaiti', 'KaiTi', '楷体', 'STSong', 'SimSun', 'Songti SC', serif;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.1;
      width: 14px;
      text-align: center;
      transition: color var(--transition-dur) ease;
    }

    /* 卡片列 */
    .card-column {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 20px 8px;
      flex-shrink: 0;
      gap: 12px;
      pointer-events: auto;
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100vw;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
      user-select: none;
    }

    .card-column:active {
      cursor: grabbing;
    }

    .card-column::-webkit-scrollbar {
      height: 4px;
    }

    .card-column::-webkit-scrollbar-track {
      background: var(--scroll-track);
      border-radius: 2px;
    }

    .card-column::-webkit-scrollbar-thumb {
      background: var(--scroll-thumb);
      border-radius: 2px;
    }

    .card {
      text-decoration: none;
      color: var(--text-primary);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 14px 12px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: all 0.4s ease;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      min-height: 0;
      flex-shrink: 0;
      opacity: 0;
      transform: translateY(12px);
      animation: cardEnter 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    .card:nth-child(1) {
      animation-delay: 0.18s;
    }

    .card:nth-child(2) {
      animation-delay: 0.30s;
    }

    .card:nth-child(3) {
      animation-delay: 0.42s;
    }

    .card:nth-child(4) {
      animation-delay: 0.54s;
    }

    .card:nth-child(5) {
      animation-delay: 0.66s;
    }

    .card:nth-child(6) {
      animation-delay: 0.78s;
    }

    .card:nth-child(7) {
      animation-delay: 0.90s;
    }

    .card:hover {

      border-color: var(--card-hover-border);
      box-shadow:
        0 6px 24px rgba(80, 60, 30, 0.14),
        0 0 40px rgba(180, 140, 80, 0.10),
        0 0 80px rgba(200, 160, 100, 0.06);
      transform: translateY(-4px) translateX(-1px);
    }

    .card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 7px;
      background: radial-gradient(ellipse 60% 40% at 50% 80%, rgba(200, 150, 80, 0.12) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: -1;
    }

    .card:hover::after {
      opacity: 1;
    }

    .card:visited {
      border-left: 3px solid rgba(160, 120, 60, 0.25);
    }

    .night-mode .card:visited {
      border-left: 3px solid rgba(200, 150, 80, 0.30);
    }

    .card-header {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--text-primary);
      transition: color var(--transition-dur) ease;
      line-height: 1.4;
    }

    .card:hover .card-title {
      color: var(--text-link-hover);
    }

    .card-tag {
      font-size: 12px;
      padding: 2px 5px;
      border-radius: 3px;
      font-weight: 500;
      letter-spacing: 2px;
      display: inline-block;
      line-height: 1.4;
    }

    .card-tag.book {
      background: rgba(160, 120, 60, 0.12);
      color: var(--text-link-hover);
    }

    .card-tag.web {
      background: rgba(100, 120, 140, 0.12);
      color: var(--text-secondary);
    }

    .card-tag.game {
      background: rgba(180, 140, 60, 0.12);
      color: #8a6830;
    }

    .card-tag.blog {
      background: rgba(110, 140, 120, 0.12);
      color: #588068;
    }

    .night-mode .card-tag.game {
      background: rgba(200, 160, 80, 0.18);
      color: #d4b878;
    }

    .night-mode .card-tag.blog {
      background: rgba(140, 170, 150, 0.18);
      color: #a0c8a8;
    }

    .card-desc {
      font-size: 16px;
      color: var(--text-secondary);
      letter-spacing: 2px;
      line-height: 1.8;
      opacity: 0.75;
      transition: color var(--transition-dur) ease;
    }


    /* 引首章 */
    .seal-intro {
      margin-bottom: 12px;
      width: 24px;
      height: 36px;
      background: var(--seal-red);
      border-radius: 12px / 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background-image:
        radial-gradient(circle 0.8px at 6px 8px, rgba(248, 240, 230, 0.40) 0%, transparent 100%),
        radial-gradient(circle 0.6px at 18px 26px, rgba(248, 240, 230, 0.35) 0%, transparent 100%);
      box-shadow: 1px 1px 3px rgba(80, 20, 15, 0.18);
      transition: background var(--transition-dur) ease;
    }

    .seal-intro-char {
      color: var(--seal-text-color);
      font-family: 'LXGW WenKai TC', 'Kaiti SC', 'STKaiti', 'KaiTi', '楷体', 'STSong', 'SimSun', 'Songti SC', serif;
      font-size: 10px;
      font-weight: 900;
      line-height: 1.2;
      transition: color var(--transition-dur) ease;
    }

    /* ===== 晝夜切換按鈕 ===== */
    .toggle-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1.5px solid rgba(120, 100, 70, 0.25);
      background: rgba(245, 240, 232, 0.60);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      color: var(--text-primary);
      transition: all 0.4s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .toggle-btn:hover {
      background: rgba(245, 240, 232, 0.88);
      transform: scale(1.08);
    }

    .night-mode .toggle-btn:hover {
      background: rgba(60, 38, 20, 0.70);
    }

    .toggle-btn .icon-sun,
    .toggle-btn .icon-moon {
      transition: opacity 0.4s ease;
      position: absolute;
    }

    .toggle-btn .icon-moon {
      opacity: 0;
    }

    .night-mode .toggle-btn .icon-sun {
      opacity: 0;
    }

    .night-mode .toggle-btn .icon-moon {
      opacity: 1;
    }

    @keyframes toggleSpin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .toggle-btn.spinning {
      animation: toggleSpin 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .night-mode .toggle-btn {
      border-color: rgba(200, 160, 100, 0.30);
      background: rgba(80, 60, 35, 0.50);
    }

    /* 夜間文字可讀性提升 */
    .night-mode .card-desc {
      opacity: 0.88;
    }

    .night-mode .card:hover {
      box-shadow:
        0 6px 24px rgba(20, 10, 0, 0.20),
        0 0 40px rgba(200, 150, 80, 0.12),
        0 0 80px rgba(220, 170, 100, 0.08);
    }

    .night-mode .card-tag.book {
      background: rgba(200, 150, 80, 0.18);
    }

    .night-mode .card-tag.web {
      background: rgba(160, 175, 195, 0.18);
    }

    .title-bg {
      position: absolute;
      top: 46%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      z-index: 10;
      pointer-events: none;
      writing-mode: vertical-rl;
      max-width: 100vw;
    }

    /* ===== 橫向滾動提示 ===== */
    .scroll-hint {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 180;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.7;
      transition: opacity 1.5s ease;
      animation: hintPulse 2.5s ease-in-out infinite;
      writing-mode: horizontal-tb;
    }

    .scroll-hint.fading {
      opacity: 0;
    }

    @keyframes hintPulse {

      0%,
      100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(12px);
      }
    }

    .scroll-hint-arrow {
      font-size: 18px;
      color: var(--text-secondary);
      line-height: 1;
    }

    .scroll-hint-text {
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 2px;
    }

    /* ===== 響應式 ===== */
    @media (max-width: 900px) {
      .scroll-content {
        padding: 30px 15px 25px 15px;
      }

      .title-container {
        top: 50px;
        left: 20px;
      }

      .main-title {
        font-size: 22px;
        letter-spacing: 8px;
      }

      .card-title {
        font-size: 18px;
        letter-spacing: 3px;
      }

      .card-desc {
        font-size: 15px;
      }

      .card-tag {
        font-size: 11px;
        padding: 2px 4px;
      }

      .scroll-hint {
        bottom: 20px;
        right: 16px;
      }

      .scroll-hint-text {
        font-size: 12px;
      }

      .title-bg {
        top: 46%;
        left: 50%;
        transform: translate(-50%, -50%);
        right: auto;
      }
    }

    @media (max-width: 500px) {
      .scroll-content {
        padding: 16px 6px 14px 6px;
      }

      .title-container {
        top: 40px;
        left: 10px;
      }

      .main-title {
        font-size: 18px;
        letter-spacing: 6px;
      }

      .card {
        padding: 12px 10px;
        gap: 4px;
      }

      .card-title {
        font-size: 17px;
        letter-spacing: 2px;
      }

      .card-desc {
        font-size: 14px;
        letter-spacing: 1px;
      }

      .card-tag {
        font-size: 10px;
        padding: 2px 3px;
        letter-spacing: 1px;
      }

      .card-column {
        padding: 12px 4px;
        gap: 8px;
      }

      .scroll-hint {
        bottom: 16px;
        right: 10px;
      }

      .scroll-hint-arrow {
        font-size: 14px;
      }

      .scroll-hint-text {
        font-size: 11px;
        letter-spacing: 1px;
      }

      .title-bg {
        top: 46%;
        left: 50%;
        transform: translate(-50%, -50%);
        right: auto;
      }
    }

    <button class="toggle-btn" id="toggleBtn" aria-label="切換晝夜模式">
      <span class="icon-sun">☀</span>
      <span class="icon-moon">☾</span>
    </button>

    <script>
      // 晝夜切換
      (function () {
        const canvas = document.getElementById('canvas');
        const btn = document.getElementById('toggleBtn');

        // 應用初始狀態
        if (document.documentElement.dataset.nightMode === 'true') {
          canvas.classList.add('night-mode');
        }

        btn.addEventListener('click', function () {
          const isNight = canvas.classList.toggle('night-mode');
          localStorage.setItem('theme', isNight ? 'dark' : 'light');
          // 旋轉動畫
          btn.classList.add('spinning');
          btn.addEventListener('animationend', function () {
            btn.classList.remove('spinning');
          }, { once: true });
        });
      })();

      // 拖拽卡片左右移動（支援滑鼠、觸屏、慣性滾動）
      (function () {
        const slider = document.querySelector('.card-column');
        if (!slider) return;

        let isDown = false;
        let startX;
        let scrollLeft;
        let moved = false;

        // ---- 慣性滾動 ----
        let velX = 0;
        let lastX = 0;
        let lastTime = 0;
        let momentumId = null;

        function stopMomentum() {
          if (momentumId) {
            cancelAnimationFrame(momentumId);
            momentumId = null;
          }
        }

        function startMomentum() {
          if (Math.abs(velX) < 0.5) return;

          const friction = 0.94;
          const minVel = 0.3;

          function step() {
            velX *= friction;
            slider.scrollLeft -= velX;

            if (Math.abs(velX) > minVel) {
              momentumId = requestAnimationFrame(step);
            } else {
              momentumId = null;
            }
          }

          momentumId = requestAnimationFrame(step);
        }

        // ---- 統一拖拽邏輯 ----
        function onStart(pageX) {
          stopMomentum();
          isDown = true;
          moved = false;
          startX = pageX - slider.offsetLeft;
          scrollLeft = slider.scrollLeft;
          velX = 0;
          lastX = pageX;
          lastTime = Date.now();
        }

        function onMove(pageX) {
          if (!isDown) return;
          const x = pageX - slider.offsetLeft;
          const walk = (x - startX) * 1.5;
          if (Math.abs(walk) > 5) {
            moved = true;
          }
          slider.scrollLeft = scrollLeft - walk;

          // 計算瞬時速度
          const now = Date.now();
          const dt = now - lastTime;
          if (dt > 0) {
            velX = ((pageX - lastX) / dt) * 16; // 歸一化至 ~60fps
          }
          lastX = pageX;
          lastTime = now;
        }

        function onEnd() {
          if (!isDown) return;
          isDown = false;
          if (moved) {
            startMomentum();
          }
        }

        // ---- 滑鼠事件 ----
        slider.addEventListener('mousedown', (e) => {
          e.preventDefault();
          onStart(e.pageX);
        });

        document.addEventListener('mousemove', (e) => {
          onMove(e.pageX);
        });

        document.addEventListener('mouseup', () => {
          onEnd();
        });

        // ---- 觸屏事件 ----
        slider.addEventListener('touchstart', (e) => {
          onStart(e.touches[0].pageX);
        }, { passive: true });

        slider.addEventListener('touchmove', (e) => {
          onMove(e.touches[0].pageX);
        }, { passive: true });

        document.addEventListener('touchend', () => {
          onEnd();
        });

        // 防止拖拽卡片鏈接時觸發 HTML5 默認拖放行為
        slider.querySelectorAll('.card').forEach(card => {
          card.addEventListener('dragstart', (e) => {
            e.preventDefault();
          });

          // 如果發生了滑動拖拽，阻止卡片點擊跳轉事件
          card.addEventListener('click', (e) => {
            if (moved) {
              e.preventDefault();
              e.stopPropagation();
            }
          });
        });

        // ---- 滾動提示自動消失 ----
        const hint = document.getElementById('scrollHint');
        if (hint) {
          let hintTimer = setTimeout(() => hint.classList.add('fading'), 5000);

          slider.addEventListener('scroll', () => {
            hint.classList.add('fading');
            clearTimeout(hintTimer);
          }, { once: true });

          slider.addEventListener('mousedown', () => {
            hint.classList.add('fading');
            clearTimeout(hintTimer);
          }, { once: true });

          slider.addEventListener('touchstart', () => {
            hint.classList.add('fading');
            clearTimeout(hintTimer);
          }, { once: true });
        }
      })();
    </script>
